<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaveamento - 64 Atletas</title>
    <style>
        :root {
            --bg-dark: #0b0b0b;
            --card-bg: #1a1a1a;
            --border-red: #d32f2f;
            --text-white: #ffffff;
            --hover-bg: #2a2a2a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 3px solid var(--border-red);
            padding-bottom: 10px;
            margin-bottom: 40px;
        }

        .tournament-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1800px;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        /* Lados das chaves */
        .bracket-half {
            display: flex;
            gap: 20px;
        }

        .bracket-half.right {
            flex-direction: row-reverse; /* Inverte o fluxo para apontar para o centro */
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 180px;
        }

        .match {
            display: flex;
            flex-direction: column;
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 4px;
            margin: 5px 0;
            position: relative;
        }

        .player {
            padding: 8px 10px;
            min-height: 20px;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: background 0.2s;
            outline: none;
        }

        .player:last-child {
            border-bottom: none;
        }

        .player:hover {
            background-color: var(--hover-bg);
        }

        /* Primeira rodada tem estilo editável */
        .player[contenteditable="true"]:empty:before {
            content: "Nome - Equipe";
            color: #666;
        }
        
        .player[contenteditable="true"] {
            border-left: 3px solid var(--border-red);
        }

        /* Centro / Final */
        .finals {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 40px;
            min-width: 200px;
        }

        .finals h2 {
            color: var(--border-red);
            text-transform: uppercase;
        }

        .final-match {
            background-color: var(--card-bg);
            border: 2px solid var(--border-red);
            border-radius: 6px;
            width: 100%;
            text-align: center;
        }
        
        .final-match .player {
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Chaveamento de Lutas</h1>

    <div class="tournament-board">
        <!-- Lado Esquerdo será gerado via JS -->
        <div id="left-bracket" class="bracket-half left"></div>

        <!-- Grande Final no Centro -->
        <div class="finals">
            <h2>Final</h2>
            <div class="final-match">
                <div class="player" id="final-left" onclick="declareChampion(this)"></div>
                <div class="player" id="final-right" onclick="declareChampion(this)"></div>
            </div>
            <h3 id="champion-name" style="color: #00ff00; margin-top: 20px;"></h3>
        </div>

        <!-- Lado Direito será gerado via JS -->
        <div id="right-bracket" class="bracket-half right"></div>
    </div>

    <script>
        // Configuração de partidas por rodada (32 atletas = 16 lutas iniciais de cada lado)
        const roundStructure = [16, 8, 4, 2, 1]; 

        function buildBracketHalf(sideId, sidePrefix) {
            const container = document.getElementById(sideId);
            
            roundStructure.forEach((numMatches, roundIndex) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';

                for (let i = 0; i < numMatches; i++) {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';

                    // Criar os dois lutadores da chave
                    for (let slot = 0; slot < 2; slot++) {
                        const playerDiv = document.createElement('div');
                        playerDiv.className = 'player';
                        playerDiv.id = `${sidePrefix}-r${roundIndex}-m${i}-s${slot}`;
                        
                        // Apenas a primeira rodada é digitável
                        if (roundIndex === 0) {
                            playerDiv.contentEditable = "true";
                        }

                        // Função ao clicar (avançar de fase)
                        playerDiv.onclick = function() {
                            advancePlayer(this, sidePrefix, roundIndex, i, slot);
                        };

                        matchDiv.appendChild(playerDiv);
                    }
                    roundDiv.appendChild(matchDiv);
                }
                container.appendChild(roundDiv);
            });
        }

        function advancePlayer(element, sidePrefix, currentRound, currentMatch, currentSlot) {
            const playerName = element.innerText.trim();
            if (!playerName) return; // Não avança se estiver vazio

            const nextRound = currentRound + 1;
            
            // Se for a última rodada do lado (venceu a semifinal do lado e vai pra Grande Final)
            if (nextRound === roundStructure.length) {
                const finalSlot = sidePrefix === 'left' ? 'final-left' : 'final-right';
                document.getElementById(finalSlot).innerText = playerName;
                return;
            }

            // Calcula a posição na próxima chave
            const nextMatch = Math.floor(currentMatch / 2);
            const nextSlot = currentMatch % 2; // 0 para cima, 1 para baixo

            const nextPlayerId = `${sidePrefix}-r${nextRound}-m${nextMatch}-s${nextSlot}`;
            const nextPlayerDiv = document.getElementById(nextPlayerId);
            
            if(nextPlayerDiv) {
                nextPlayerDiv.innerText = playerName;
            }
        }

        function declareChampion(element) {
            const championName = element.innerText.trim();
            if (championName) {
                document.getElementById('champion-name').innerText = `🏆 CAMPEÃO: ${championName} 🏆`;
            }
        }

        // Inicializa as duas metades
        buildBracketHalf('left-bracket', 'left');
        buildBracketHalf('right-bracket', 'right');
    </script>
</body>
</html>
