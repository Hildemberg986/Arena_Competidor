<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arena Competidor • Live Center</title>

<style>
:root{
--bg:#060606;
--card:#111;
--line:#222;
--red:#ff2020;
--text:#fff;
--muted:#999;
--green:#18d46b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
background:
radial-gradient(circle at top right,#240000 0%,transparent 25%),
radial-gradient(circle at bottom left,#140000 0%,transparent 20%),
var(--bg);
color:#fff;
height:100vh;
overflow:hidden;
}

header{
height:72px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid var(--line);
background:rgba(10,10,10,.95);
backdrop-filter:blur(8px);
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:42px;
height:42px;
border-radius:14px;
background:linear-gradient(145deg,var(--red),#8a0000);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:20px;
}

.brand h1{
font-size:20px;
}

.brand span{
color:var(--red);
}

.stats{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.box{
padding:10px 14px;
border-radius:14px;
background:#111;
border:1px solid #222;
font-size:13px;
color:#aaa;
}

.box b{
color:#fff;
}

main{
padding:14px;
height:calc(100vh - 72px);
overflow:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
height:100%;
}

.live{
background:var(--card);
border:1px solid var(--line);
border-radius:18px;
overflow:hidden;
display:flex;
flex-direction:column;
min-height:300px;
}

.top{
height:42px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
background:#151515;
border-bottom:1px solid #222;
font-size:13px;
}

.left{
display:flex;
align-items:center;
gap:8px;
font-weight:700;
}

.dot{
width:9px;
height:9px;
border-radius:50%;
background:var(--green);
box-shadow:0 0 10px rgba(24,212,107,.7);
}

small{
color:#bbb;
}

iframe{
width:100%;
height:100%;
border:none;
flex:1;
}

@media(max-width:1200px){
.grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>

<div class="brand">
<div class="logo">A</div>
<h1>Arena <span>Competidor</span></h1>
</div>

<div class="stats">
<div class="box">🔴 Lives <b>6</b></div>
<div class="box">📡 Evento ao Vivo</div>
<div class="box">⏱ <b id="clock"></b></div>
</div>

</header>

<main>

<div class="grid">

<!-- AREA 1 -->
<div class="live">
<div class="top">
<div class="left"><div class="dot"></div>Área 01</div>
<small>AO VIVO</small>
</div>
<iframe src="https://www.youtube.com/embed/FgkvumJ2YWw?autoplay=0&mute=1" allowfullscreen></iframe>
</div>

<!-- AREA 2 -->
<div class="live">
<div class="top">
<div class="left"><div class="dot"></div>Área 02</div>
<small>AO VIVO</small>
</div>
<iframe src="https://www.youtube.com/embed/c8MzmYr9HYY?autoplay=0&mute=1" allowfullscreen></iframe>
</div>

<!-- AREA 3 -->
<div class="live">
<div class="top">
<div class="left"><div class="dot"></div>Área 03</div>
<small>AO VIVO</small>
</div>
<iframe src="https://www.youtube.com/embed/XZpK2uyC_Js?autoplay=0&mute=1" allowfullscreen></iframe>
</div>

<!-- AREA 4 -->
<div class="live">
<div class="top">
<div class="left"><div class="dot"></div>Área 04</div>
<small>AO VIVO</small>
</div>
<iframe src="https://www.youtube.com/embed/xIEzJ-gVNvo?autoplay=0&mute=1" allowfullscreen></iframe>
</div>

<!-- AREA 5 -->
<div class="live">
<div class="top">
<div class="left"><div class="dot"></div>Área 05</div>
<small>AO VIVO</small>
</div>
<iframe src="https://www.youtube.com/embed/msst6vTPCmM?autoplay=0&mute=1" allowfullscreen></iframe>
</div>

<!-- AREA 6 -->
<div class="live">
<div class="top">
<div class="left"><div class="dot"></div>Área 06</div>
<small>AO VIVO</small>
</div>
<iframe src="https://www.youtube.com/embed/a1pbOBqM8XE?autoplay=0&mute=1" allowfullscreen></iframe>
</div>

</div>

</main>

<script>
function clock(){
document.getElementById("clock").innerText =
new Date().toLocaleTimeString("pt-BR");
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
