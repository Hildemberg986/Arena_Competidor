<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arena Competidor • Live Control</title>

<style>
:root{
--bg:#070707;
--card:#121212;
--card2:#181818;
--line:#242424;
--red:#ff2020;
--red2:#d90000;
--text:#ffffff;
--muted:#9d9d9d;
--green:#12d66a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
background:
radial-gradient(circle at top right,#1a0000 0%,transparent 25%),
radial-gradient(circle at bottom left,#140000 0%,transparent 25%),
var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

/* HEADER */
header{
height:74px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 22px;
border-bottom:1px solid var(--line);
background:rgba(10,10,10,.92);
backdrop-filter:blur(8px);
}

.brand{
display:flex;
align-items:center;
gap:14px;
}

.logo{
width:42px;
height:42px;
border-radius:14px;
background:linear-gradient(145deg,var(--red),#700000);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:20px;
box-shadow:0 0 25px rgba(255,0,0,.25);
}

.brand h1{
font-size:19px;
font-weight:700;
letter-spacing:.4px;
}

.brand span{
color:var(--red);
}

.topstats{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.stat{
padding:10px 14px;
border:1px solid var(--line);
border-radius:14px;
background:#111;
font-size:13px;
color:var(--muted);
}

.stat b{
color:#fff;
font-size:14px;
}

/* LAYOUT */
.wrap{
display:grid;
grid-template-columns:360px 1fr;
height:calc(100vh - 74px);
}

/* SIDEBAR */
aside{
padding:18px;
overflow:auto;
border-right:1px solid var(--line);
background:rgba(14,14,14,.86);
}

.panel{
background:var(--card);
border:1px solid var(--line);
border-radius:18px;
padding:16px;
margin-bottom:14px;
}

.title{
font-size:13px;
font-weight:700;
letter-spacing:.7px;
color:var(--red);
margin-bottom:14px;
}

.grid-form{
display:grid;
gap:10px;
}

.slot{
padding:12px;
border-radius:14px;
background:var(--card2);
border:1px solid var(--line);
}

.slot label{
display:block;
font-size:12px;
margin-bottom:7px;
color:#c7c7c7;
}

.slot input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:12px;
background:#0b0b0b;
color:#fff;
font-size:13px;
border:1px solid #202020;
}

.slot input:focus{
border:1px solid var(--red);
box-shadow:0 0 0 3px rgba(255,0,0,.12);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
font-size:14px;
margin-top:14px;
background:linear-gradient(145deg,var(--red),var(--red2));
color:#fff;
transition:.2s;
}

button:hover{
transform:translateY(-1px);
filter:brightness(1.05);
}

.helper{
font-size:12px;
color:var(--muted);
line-height:1.5;
margin-top:12px;
}

/* MAIN */
main{
padding:18px;
overflow:auto;
}

.live-grid{
display:grid;
gap:14px;
height:100%;
}

.live{
background:#101010;
border:1px solid var(--line);
border-radius:18px;
overflow:hidden;
display:flex;
flex-direction:column;
min-height:260px;
}

.live-top{
height:42px;
padding:0 14px;
display:flex;
align-items:center;
justify-content:space-between;
background:#141414;
border-bottom:1px solid #1e1e1e;
font-size:13px;
}

.badge{
display:flex;
align-items:center;
gap:8px;
font-weight:700;
}

.dot{
width:9px;
height:9px;
border-radius:50%;
background:var(--green);
box-shadow:0 0 10px rgba(18,214,106,.7);
}

small{
color:#bcbcbc;
font-size:12px;
}

iframe{
width:100%;
height:100%;
border:none;
flex:1;
}

.empty{
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#666;
border:1px dashed #222;
border-radius:18px;
}

/* RESPONSIVO */
@media(max-width:1100px){
.wrap{
grid-template-columns:1fr;
}
aside{
max-height:380px;
}
}
</style>
</head>
<body>

<header>

<div class="brand">
<div class="logo">A</div>
<h1>Arena <span>Competidor</span></h1>
</div>

<div class="topstats">
<div class="stat">🔴 Ativas <b id="count">0</b></div>
<div class="stat">👥 Viewers <b>API</b></div>
<div class="stat">💬 Chat <b>API</b></div>
<div class="stat">⏱ <b id="clock"></b></div>
</div>

</header>

<div class="wrap">

<aside>

<div class="panel">
<div class="title">STREAM KEYS / CHAVES DE TRANSMISSÃO</div>

<div class="grid-form" id="inputs"></div>

<button onclick="renderLives()">ATIVAR PAINEL</button>

<div class="helper">
Cole a chave RTMP ou código de implementação de cada área.<br>
Integração YouTube API pode ser adicionada depois.
</div>
</div>

</aside>

<main>
<div class="live-grid" id="grid">
<div class="empty">Nenhuma transmissão configurada</div>
</div>
</main>

</div>

<script>
const form = document.getElementById("inputs");
const grid = document.getElementById("grid");

for(let i=1;i<=12;i++){
form.innerHTML += `
<div class="slot">
<label>Área ${i}</label>
<input id="k${i}" placeholder="Cole a chave de transmissão">
</div>`;
}

function renderLives(){

let arr = [];

for(let i=1;i<=12;i++){
let val = document.getElementById("k"+i).value.trim();

if(val !== ""){
arr.push({area:i,key:val});
}
}

document.getElementById("count").innerText = arr.length;

if(arr.length===0){
grid.innerHTML=`<div class="empty">Nenhuma transmissão configurada</div>`;
return;
}

let cols = 1;

if(arr.length===1) cols=1;
else if(arr.length<=4) cols=2;
else if(arr.length<=9) cols=3;
else cols=4;

grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
grid.innerHTML="";

arr.forEach(item=>{

grid.innerHTML += `
<div class="live">
<div class="live-top">
<div class="badge">
<div class="dot"></div>
Área ${item.area}
</div>
<small>LIVE READY</small>
</div>

<!-- EMBED TEMPORÁRIO -->
<iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig&mute=1"></iframe>

</div>
`;

});

}

function clock(){
document.getElementById("clock").innerText =
new Date().toLocaleTimeString("pt-BR");
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
