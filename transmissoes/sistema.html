<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arena Competidor • Live Center PRO</title>

<style>
:root {
  --bg: #050505;
  --card: #111111;
  --card2: #171717;
  --line: #262626;
  --red: #ff1f1f;
  --red-hover: #cc0000;
  --red2: #a40000;
  --text: #ffffff;
  --muted: #9d9d9d;
  --green: #19d66b;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

/* SCROLLBAR PERSONALIZADA */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #333; }

body {
  background: 
    radial-gradient(circle at top right, #220000 0%, transparent 25%),
    radial-gradient(circle at bottom left, #120000 0%, transparent 25%),
    var(--bg);
  color: #fff;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
header {
  height: 78px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  background: rgba(8, 8, 8, .92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  background: linear-gradient(145deg, var(--red), var(--red2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 22px;
  box-shadow: 0 0 25px rgba(255, 0, 0, .25);
}

.brand h1 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: .5px;
}

.brand span { color: var(--red); }

.top {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.stat {
  padding: 11px 15px;
  background: #101010;
  border: 1px solid var(--line);
  border-radius: 16px;
  font-size: 13px;
  color: #aaa;
}

.stat b { color: #fff; }

/* MAIN */
main {
  padding: 16px;
  height: calc(100vh - 78px);
  overflow-y: auto;
}

/* FEATURED */
.featured {
  height: 420px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  margin-bottom: 24px;
}

.feature-top {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: #161616;
  border-bottom: 1px solid #222;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 800;
  font-size: 14px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px rgba(25, 214, 107, .7);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(25, 214, 107, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(25, 214, 107, 0); }
  100% { box-shadow: 0 0 0 0 rgba(25, 214, 107, 0); }
}

.featured iframe {
  width: 100%;
  height: 100%;
  border: none;
  flex: 1;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
  padding-bottom: 20px;
}

.card {
  height: 180px; /* Reduzido para focar na proporção de vídeo */
  background: var(--card);
  border: 2px solid var(--line);
  border-radius: 18px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}

.card:hover {
  transform: translateY(-4px);
  border-color: #444;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* Card Ativo no momento */
.card.active {
  border-color: var(--red);
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
}

.card-top {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  background: #151515;
  border-bottom: 1px solid #222;
  font-size: 13px;
  font-weight: 600;
  z-index: 2;
}

.card-top small { color: var(--red); font-weight: bold; }

/* Usando Thumbnails para não travar o navegador com 7 iframes */
.thumb-container {
  position: relative;
  flex: 1;
  width: 100%;
  overflow: hidden;
  background: #000;
}

.thumb-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.8;
  transition: opacity 0.3s;
}

.play-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all 0.3s ease;
}

.play-overlay svg {
  width: 40px;
  height: 40px;
  fill: #fff;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  transform: scale(0.8);
  transition: transform 0.3s ease;
}

.card:hover .thumb-container img { opacity: 1; }
.card:hover .play-overlay { opacity: 1; }
.card:hover .play-overlay svg { transform: scale(1); }

/* RESPONSIVO */
@media(max-width: 1400px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}

@media(max-width: 900px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .featured { height: 320px; }
}

@media(max-width: 650px) {
  .grid { grid-template-columns: 1fr; }
  .featured { height: 260px; }
  header {
    flex-direction: column;
    height: auto;
    padding: 16px;
    gap: 12px;
  }
  .top { justify-content: center; }
  main { height: calc(100vh - 140px); }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">A</div>
    <h1>Arena <span>Competidor</span></h1>
  </div>

  <div class="top">
    <div class="stat">🔴 Áreas <b>6 AO VIVO</b></div>
    <div class="stat">🏆 Open Caicó</div>
    <div class="stat">🎥 Direção PRO</div>
    <div class="stat">⏱ <b id="clock"></b></div>
  </div>
</header>

<main>
  <section class="featured">
    <div class="feature-top">
      <div class="live-badge">
        <div class="dot"></div>
        <span id="mainTitle">Área 01 • Principal</span>
      </div>
      <small style="color:var(--muted)">AO VIVO</small>
    </div>
    
    <iframe id="mainFrame" src="https://www.youtube.com/embed/FgkvumJ2YWw?autoplay=1&mute=0" allow="autoplay; encrypted-media" allowfullscreen title="Transmissão Principal"></iframe>
  </section>

  <section class="grid" id="videoGrid">
    
    <div class="card active" data-id="FgkvumJ2YWw" data-name="Área 01">
      <div class="card-top"><span>Área 01</span><small>LIVE</small></div>
      <div class="thumb-container">
        <img src="https://img.youtube.com/vi/FgkvumJ2YWw/hqdefault.jpg" alt="Thumbnail Área 01">
        <div class="play-overlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <div class="card" data-id="c8MzmYr9HYY" data-name="Área 02">
      <div class="card-top"><span>Área 02</span><small>LIVE</small></div>
      <div class="thumb-container">
        <img src="https://img.youtube.com/vi/c8MzmYr9HYY/hqdefault.jpg" alt="Thumbnail Área 02">
        <div class="play-overlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <div class="card" data-id="XZpK2uyC_Js" data-name="Área 03">
      <div class="card-top"><span>Área 03</span><small>LIVE</small></div>
      <div class="thumb-container">
        <img src="https://img.youtube.com/vi/XZpK2uyC_Js/hqdefault.jpg" alt="Thumbnail Área 03">
        <div class="play-overlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <div class="card" data-id="xIEzJ-gVNvo" data-name="Área 04">
      <div class="card-top"><span>Área 04</span><small>LIVE</small></div>
      <div class="thumb-container">
        <img src="https://img.youtube.com/vi/xIEzJ-gVNvo/hqdefault.jpg" alt="Thumbnail Área 04">
        <div class="play-overlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <div class="card" data-id="msst6vTPCmM" data-name="Área 05">
      <div class="card-top"><span>Área 05</span><small>LIVE</small></div>
      <div class="thumb-container">
        <img src="https://img.youtube.com/vi/msst6vTPCmM/hqdefault.jpg" alt="Thumbnail Área 05">
        <div class="play-overlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <div class="card" data-id="a1pbOBqM8XE" data-name="Área 06">
      <div class="card-top"><span>Área 06</span><small>LIVE</small></div>
      <div class="thumb-container">
        <img src="https://img.youtube.com/vi/a1pbOBqM8XE/hqdefault.jpg" alt="Thumbnail Área 06">
        <div class="play-overlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

  </section>
</main>

<script>
  // Controle do Relógio
  const clockElement = document.getElementById("clock");
  function updateClock() {
    clockElement.innerText = new Date().toLocaleTimeString("pt-BR");
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Controle de Troca de Vídeos
  const cards = document.querySelectorAll('.card');
  const mainTitle = document.getElementById('mainTitle');
  const mainFrame = document.getElementById('mainFrame');

  cards.forEach(card => {
    card.addEventListener('click', function() {
      // Remove a classe ativa de todos
      cards.forEach(c => c.classList.remove('active'));
      
      // Adiciona a classe ativa no clicado
      this.classList.add('active');

      // Coleta os dados do dataset (data-id e data-name)
      const videoId = this.getAttribute('data-id');
      const videoName = this.getAttribute('data-name');

      // Atualiza o player principal
      mainTitle.innerText = `${videoName} • Principal`;
      // O parâmetro autoplay=1 tenta rodar direto ao trocar, e allow="autoplay" ajuda nisso.
      mainFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0`;
      
      // Opcional: Rolar a página para o topo em telas menores
      if(window.innerWidth <= 900) {
        document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  });
</script>

</body>
</html>
