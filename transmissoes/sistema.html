<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arena Competidor • Live Center PRO</title>

<style>
:root {
  --bg: #050505;
  --card: #111111;
  --line: #262626;
  --red: #ff1f1f;
  --text: #ffffff;
  --muted: #9d9d9d;
  --green: #19d66b;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

body {
  background: radial-gradient(circle at top right, #220000 0%, transparent 25%), var(--bg);
  color: #fff; height: 100vh; overflow: hidden;
}

header {
  height: 90px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; background: rgba(8, 8, 8, .92); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
}

.logo { height: 70px; width: 180px; display: flex; align-items: center; }
.logo img { height: 100%; width: 100%; object-fit: contain; }

.top { display: flex; gap: 10px; }
.stat {
  padding: 11px 15px; background: #101010; border: 1px solid var(--line);
  border-radius: 16px; font-size: 13px; color: #aaa;
}

main { padding: 16px; height: calc(100vh - 90px); overflow-y: auto; }

.featured {
  height: 440px; background: var(--card); border: 1px solid var(--line);
  border-radius: 22px; overflow: hidden; display: flex; flex-direction: column; margin-bottom: 24px;
}

.feature-top {
  height: 48px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; background: #161616; border-bottom: 1px solid #222;
}

.live-badge { display: flex; align-items: center; gap: 8px; font-weight: bold; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; padding-bottom: 30px; }

.card {
  height: 180px; background: var(--card); border: 2px solid var(--line);
  border-radius: 18px; overflow: hidden; cursor: pointer; transition: 0.2s;
  display: flex; flex-direction: column;
}

.card:hover { border-color: #444; transform: translateY(-3px); }
.card.active { border-color: var(--red); box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }

.card-top { height: 40px; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; background: #151515; font-size: 12px; }
.card-top small { color: var(--red); font-weight: bold; }

.thumb-container { position: relative; flex: 1; background: #000; }
.thumb-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

.play-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
}
.card:hover .play-overlay { opacity: 1; }
.card:hover .thumb-container img { opacity: 1; }

@media(max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media(max-width: 650px) {
  .grid { grid-template-columns: 1fr; }
  header { flex-direction: column; height: auto; padding: 15px; gap: 15px; }
  .logo { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><img src="../img/arena2.png" alt="Logo"></div>
  <div class="top" id="statsHeader">
    </div>
</header>

<main>
  <section class="featured">
    <div class="feature-top">
      <div class="live-badge"><div class="dot"></div><span id="mainTitle">Carregando...</span></div>
      <small style="color:var(--muted)">AO VIVO</small>
    </div>
    <iframe id="mainFrame" src="" allow="autoplay; encrypted-media" allowfullscreen style="width:100%; height:100%; border:none;"></iframe>
  </section>

  <section class="grid" id="videoGrid">
    </section>
</main>

<script>
  // 1. DADOS SIMULADOS (O que viria da API)
  const apiData = {
    evento: "Open Caicó",
    direcao: "Direção PRO",
    cameras: [
      { id: "FgkvumJ2YWw", nome: "Área 01", principal: true },
      { id: "c8MzmYr9HYY", nome: "Área 02", principal: false },
      { id: "XZpK2uyC_Js", nome: "Área 03", principal: false },
      { id: "xIEzJ-gVNvo", nome: "Área 04", principal: false },
      { id: "msst6vTPCmM", nome: "Área 05", principal: false },
      { id: "a1pbOBqM8XE", nome: "Área 06", principal: false }
    ]
  };

  // 2. FUNÇÃO PARA CARREGAR O CONTEÚDO
  function initArena() {
    const grid = document.getElementById('videoGrid');
    const statsHeader = document.getElementById('statsHeader');
    
    // Atualiza Header Stats
    statsHeader.innerHTML = `
      <div class="stat">🔴 Áreas <b>${apiData.cameras.length} AO VIVO</b></div>
      <div class="stat">🏆 ${apiData.evento}</div>
      <div class="stat">🎥 ${apiData.direcao}</div>
      <div class="stat">⏱ <b id="clock">00:00:00</b></div>
    `;

    // Gera os Cards Dinamicamente
    grid.innerHTML = apiData.cameras.map(cam => `
      <div class="card ${cam.principal ? 'active' : ''}" onclick="changeVideo('${cam.id}', '${cam.nome}', this)">
        <div class="card-top"><span>${cam.nome}</span><small>LIVE</small></div>
        <div class="thumb-container">
          <img src="https://img.youtube.com/vi/${cam.id}/hqdefault.jpg">
          <div class="play-overlay">
            <svg width="40" height="40" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      </div>
    `).join('');

    // Define o vídeo inicial
    const principal = apiData.cameras.find(c => c.principal);
    changeVideo(principal.id, principal.nome);
    startClock();
  }

  // 3. LOGICA DE TROCA
  function changeVideo(id, nome, element) {
    document.getElementById('mainTitle').innerText = `${nome} • Principal`;
    document.getElementById('mainFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=0`;
    
    if(element) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      element.classList.add('active');
    }
  }

  // 4. RELÓGIO
  function startClock() {
    setInterval(() => {
      document.getElementById("clock").innerText = new Date().toLocaleTimeString("pt-BR");
    }, 1000);
  }

  // Inicializa tudo
  window.onload = initArena;

  /* Para usar com API REAL, você faria:
     fetch('URL_DA_SUA_API')
       .then(res => res.json())
       .then(data => { 
          // substitua apiData por data e chame initArena()
       });
  */
</script>

</body>
</html>
