<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Combate Oficial - Ultra Responsive TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #b9b9b9;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh 4vw;
            overflow: hidden;
            position: relative;
        }

        /* --- TOPO: LOGO CENTRALIZADA E RELÓGIO FLUIDO --- */
        header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 14vh;
            min-height: 60px;
        }

        .logo-container {
            height: 100%;
            max-width: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 0px 25px rgba(0, 0, 0, 0.2));
        }

        .logo-fallback {
            font-size: 3.5vh;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            line-height: 1.1;
            text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.3);
        }

        .brand-clock {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 4.2vh;
            font-weight: 700;
            font-family: monospace;
            color: #ffffff;
            letter-spacing: 1px;
            background: rgba(15, 15, 15, 0.8);
            padding: 0.8vh 1.5vw;
            border-radius: 6px;
            border: 1px solid #222;
        }

        /* --- CENTRO: AREA DO CRONÔMETRO DINÂMICO --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 1vh 0;
            width: 100%;
        }

        .status-banner {
            font-size: 4.5vh;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.2vw;
            margin-bottom: 0.5vh;
            transition: all 0.3s ease;
        }

        .status-banner.work { color: #ffffff; text-shadow: 0 0 30px rgba(229,9,20,0.5); }
        .status-banner.rest { color: #ffffff; text-shadow: 0 0 30px rgba(0,255,102,0.5); }
        .status-banner.paused { color: #ffffff; text-shadow: 0 0 30px rgba(255,204,0,0.4); }

        .main-timer {
            font-size: 38vh;
            font-weight: 900;
            font-family: monospace;
            line-height: 0.8;
            color: #ffffff;
            letter-spacing: -0.5vw;
            text-shadow: 0px 15px 50px rgba(0,0,0,0.9);
        }

        .round-display {
            font-size: 5vh;
            font-weight: 800;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 2px;
            margin-top: 1vh;
        }

        .round-display span {
            color: #ffffff;
            font-size: 6.2vh;
            margin-left: 10px;
            line-height: 1;
        }

        /* --- INFERIOR --- */
        footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5vh;
            border-top: 2px solid #111;
            padding-top: 2vh;
            height: 18vh;
            min-height: 120px;
        }

        .time-options {
            display: flex;
            gap: 1vw;
            width: 100%;
            max-width: 900px;
            justify-content: center;
        }

        .btn-option {
            flex: 1;
            background-color: #0c0c0c;
            color: #777;
            border: 2px solid #222;
            padding: 1.2vh 0.5vw;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .btn-option:focus {
            border-color: #000000 !important;
            color: #fff !important;
            background-color: #1a1a1a;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            transform: scale(1.04);
        }

        .btn-option.active {
            background-color: #111;
            border-color: #000000;
            color: #ffffff;
            box-shadow: inset 0 0 10px rgba(229, 9, 20, 0.2);
        }

        .btn-option:disabled {
            opacity: 0.15;
            cursor: not-allowed;
        }

        .action-controls {
            display: flex;
            gap: 1.5vw;
            width: 100%;
            max-width: 900px;
        }

        .btn {
            flex: 2;
            background-color: #111;
            color: #fff;
            border: 2px solid #333;
            padding: 1.5vh 0;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            transition: all 0.15s ease;
        }

        .btn:focus {
            border-color: #ffffff !important;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .btn-start {
            background-color: #ff000d;
            border-color: #ff000d;
            flex: 3;
        }

        .btn-start:focus {
            border-color: #ffcc00 !important;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
        }

        .btn-pause {
            background-color: #ffcc00;
            border-color: #ffcc00;
            color: #000;
            flex: 3;
        }

        .btn-reset { color: #aaa; }

        @media (max-width: 768px) or (orientation: portrait) {
            .main-timer { font-size: 20vh; }
            .status-banner { font-size: 3.5vh; }
            .round-display { font-size: 4vh; }
            .round-display span { font-size: 5vh; }
            .time-options, .action-controls { max-width: 100%; }
            .brand-clock { position: relative; right: auto; top: auto; transform: none; margin-left: 20px; }
            header { justify-content: space-between; padding: 0 10px; }
            .btn { font-size: 1.1rem; padding: 12px 0; }
            .btn-option { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- TOPO -->
    <header>
        <div class="logo-container">
            <img src="wateam.png" alt="Logo Academia" onerror="this.style.display='none'; document.getElementById('fallback').style.display='block'">
            <div id="fallback" class="logo-fallback" style="display: none;">WA TEAM<br><span style="color:#fff; font-size:1.5vh; letter-spacing:4px;">COMBAT TEAM</span></div>
        </div>
        <div class="brand-clock" id="clock">00:00:00</div>
    </header>

    <!-- ÁREA CENTRAL DO TIMER -->
    <main>
        <div class="status-banner paused" id="status-text">CONFIGURAÇÃO</div>
        <div class="main-timer" id="timer-display">05:00</div>
        <div class="round-display" id="round-display">ROUND <span>1</span></div>
    </main>

    <!-- INFERIOR -->
    <footer>
        <div class="time-options">
            <button class="btn-option" data-seconds="45" tabindex="1">45 Seg (Extra)</button>
            <button class="btn-option" data-seconds="120" tabindex="2">2 Min</button>
            <button class="btn-option active" data-seconds="300" tabindex="3">5 Min</button>
            <button class="btn-option" data-seconds="480" tabindex="4">8 Min</button>
            <button class="btn-option" data-seconds="600" tabindex="5">10 Min</button>
        </div>

        <div class="action-controls">
            <button class="btn btn-start" id="btn-start-pause" tabindex="6">Iniciar</button>
            <button class="btn btn-reset" id="btn-reset" tabindex="7">Resetar</button>
        </div>
    </footer>

    <!-- AUDIO SINC -->
    <audio id="sound-horn" src="buzina.mp3" preload="auto"></audio>
    <audio id="sound-warning" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script>
        let timerSeconds = 300; 
        let currentRound = 1;
        let isRunning = false;
        let isResting = false;
        let countdownInterval = null;
        let warningPlayed = false;

        const restDuration = 35; 

        const timerDisplay = document.getElementById('timer-display');
        const statusText = document.getElementById('status-text');
        const roundDisplay = document.getElementById('round-display');
        const clockDisplay = document.getElementById('clock');
        const btnStartPause = document.getElementById('btn-start-pause');
        const btnReset = document.getElementById('btn-reset');
        const optionButtons = document.querySelectorAll('.btn-option');

        const soundHorn = document.getElementById('sound-horn');
        const soundWarning = document.getElementById('sound-warning');

        soundHorn.volume = 1.0;
        soundWarning.volume = 1.0;

        function updateClock() {
            const now = new Date();
            clockDisplay.textContent = String(now.getHours()).padStart(2, '0') + ':' +
                                      String(now.getMinutes()).padStart(2, '0') + ':' +
                                      String(now.getSeconds()).padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timerSeconds);
            roundDisplay.innerHTML = isResting ? `DESCANSO` : `ROUND <span>${currentRound}</span>`;
            
            if (!isRunning) {
                statusText.textContent = "PAUSADO";
                statusText.className = "status-banner paused";
            } else if (isResting) {
                statusText.textContent = "RECUPERE";
                statusText.className = "status-banner rest";
            } else {
                statusText.textContent = "COMBATE";
                statusText.className = "status-banner work";
            }
        }

        function getSelectedRoundTime() {
            const activeBtn = document.querySelector('.btn-option.active');
            return activeBtn ? parseInt(activeBtn.getAttribute('data-seconds')) : 300;
        }

        function initTimer() {
            if (!isRunning) {
                timerSeconds = getSelectedRoundTime();
                isResting = false;
                currentRound = 1;
                warningPlayed = false;
                updateDisplay();
            }
        }

        function playSound(audioElement) {
            audioElement.currentTime = 0;
            audioElement.volume = 1.0; 
            audioElement.play().catch(e => console.log("Aguardando interação inicial."));
        }

        function tick() {
            if (timerSeconds > 0) {
                timerSeconds--;
                if (!isResting && timerSeconds === 10 && !warningPlayed && getSelectedRoundTime() > 10) {
                    playSound(soundWarning);
                    warningPlayed = true;
                }
            } else {
                playSound(soundHorn);
                warningPlayed = false;

                if (!isResting) {
                    isResting = true;
                    timerSeconds = restDuration;
                } else {
                    isResting = false;
                    currentRound++;
                    timerSeconds = getSelectedRoundTime();
                }
            }
            updateDisplay();
        }

        function toggleButtonsState(disable) {
            optionButtons.forEach(btn => {
                btn.disabled = disable;
                if (disable) {
                    btn.removeAttribute('tabindex');
                } else {
                    if(btn.textContent.includes("45")) btn.setAttribute('tabindex', '1');
                    if(btn.textContent.includes("2")) btn.setAttribute('tabindex', '2');
                    if(btn.textContent.includes("5")) btn.setAttribute('tabindex', '3');
                    if(btn.textContent.includes("8")) btn.setAttribute('tabindex', '4');
                    if(btn.textContent.includes("10")) btn.setAttribute('tabindex', '5');
                }
            });
        }

        function startPause() {
            soundHorn.volume = 1.0;
            soundWarning.volume = 1.0;
            
            // "Prepara" o áudio para tocar sem bloqueio de segurança do navegador
            soundHorn.play().then(() => { soundHorn.pause(); }).catch(() => {});
            soundWarning.play().then(() => { soundWarning.pause(); }).catch(() => {});

            if (isRunning) {
                isRunning = false;
                clearInterval(countdownInterval);
                toggleButtonsState(false);
                btnStartPause.textContent = "Iniciar";
                btnStartPause.className = "btn btn-start";
            } else {
                isRunning = true;
                toggleButtonsState(true);
                btnStartPause.textContent = "Pausar";
                btnStartPause.className = "btn btn-pause";
                countdownInterval = setInterval(tick, 1000);
            }
            updateDisplay();
        }

        function reset() {
            isRunning = false;
            clearInterval(countdownInterval);
            toggleButtonsState(false);
            btnStartPause.textContent = "Iniciar";
            btnStartPause.className = "btn btn-start";
            initTimer();
        }

        optionButtons.forEach(button => {
            button.addEventListener('click', function() {
                if (!isRunning) {
                    optionButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    initTimer();
                }
            });
        });

        btnStartPause.addEventListener('click', startPause);
        btnReset.addEventListener('click', reset);

        initTimer();
    </script>
</body>
</html>
