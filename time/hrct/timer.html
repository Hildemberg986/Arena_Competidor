<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel CT - HR Fight Team Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            background-image: radial-gradient(circle, #0f0f0f 0%, #050505 100%);
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3vh 3vw;
            overflow: hidden;
            font-family: 'Bebas Neue', sans-serif;
        }

        /* Cores Temáticas */
        .txt-vermelho { color: #e60000; }
        .txt-branco { color: #ffffff; }
        .txt-cinza { color: #666666; }

        /* Moldura interna fina */
        .moldura-painel {
            position: absolute;
            top: 2vh; left: 2vw; right: 2vw; bottom: 2vh;
            border: 1px solid rgba(230, 0, 0, 0.12);
            pointer-events: none;
            border-radius: 15px;
            z-index: 0;
        }

        /* ==========================================
           ESTRUTURA DE CORPO DE TRÊS COLUNAS fixas
        ========================================== */
        .painel-principal {
            display: grid;
            grid-template-columns: 1fr auto 1.3fr auto 1fr; /* Centraliza perfeitamente a coluna do meio */
            align-items: center;
            flex: 1;
            width: 100%;
            z-index: 10;
        }

        /* Linhas Divisórias Verticais */
        .divisoria {
            width: 1px;
            height: 50vh;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.25), transparent);
        }

        /* COLUNA 1: Esquerda (Hora e Data reduzidos) */
        .bloco-esquerda {
            display: flex;
            flex-direction: column;
            gap: 4vh;
            padding-left: 1.5vw;
            justify-content: center;
        }

        /* COLUNA 3: Centro (Logo Absolutamente Centralizado) */
        .bloco-centro {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2vh;
            padding: 0 2vw;
        }

        /* COLUNA 5: Direita (Cronômetro) */
        .bloco-direita {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-right: 1.5vw;
        }

        /* ==========================================
           COMPONENTES REDUZIDOS (Esquerda)
        ========================================== */
        .info-grupo {
            display: flex;
            flex-direction: column;
        }

        .header-section {
            display: flex;
            align-items: center;
            gap: 0.8vw;
            font-size: 1.5vw; /* Reduzido */
            letter-spacing: 2px;
            margin-bottom: 0.5vh;
        }

        .header-section i {
            color: #e60000;
            font-size: 1.3vw;
        }

        .valor-digital {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.2vw; /* Reduzido de 6.2vw para 4.2vw */
            font-weight: 700;
            line-height: 1;
            letter-spacing: 1px;
        }

        .sub-data-dia {
            font-size: 1.6vw; /* Reduzido de 2.2vw para 1.6vw */
            letter-spacing: 2px;
            margin-top: 0.5vh;
            font-weight: bold;
        }

        .glow-line {
            width: 70%;
            height: 1px;
            background: linear-gradient(90deg, #e60000, transparent);
            margin-top: 1vh;
        }

        /* ==========================================
           COMPONENTES CENTRALIZADOS (Centro)
        ========================================== */
        .logo-ct {
            max-width: 90%;
            max-height: 42vh; /* Ganhou um pouco mais de espaço */
            object-fit: contain;
            filter: drop-shadow(0px 0px 25px rgba(230, 0, 0, 0.25));
        }

        .sub-logo-texto {
            text-align: center;
        }
        .sub-logo-texto h2 {
            font-size: 3.5vw;
            letter-spacing: 2px;
            line-height: 1;
        }
        .sub-logo-texto p {
            font-size: 1.3vw;
            letter-spacing: 4px;
            color: #aaaaaa;
        }

        /* ==========================================
           COMPONENTES DO TIMER (Direita)
        ========================================== */
        .timer-container {
            position: relative;
            width: 28vw;
            height: 28vw;
            max-width: 380px;
            max-height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timer-container svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circle-ticks {
            fill: none;
            stroke: #222222;
            stroke-width: 12;
            stroke-dasharray: 2px 4px;
        }

        .circle-progress {
            fill: none;
            stroke: #e60000;
            stroke-width: 12;
            stroke-linecap: square;
            transition: stroke-dashoffset 1s linear;
        }

        .cronometro-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .cronometro-texto {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.2vw;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(230, 0, 0, 0.2);
        }

        .cronometro-legendas {
            font-size: 1.1vw;
            letter-spacing: 5px;
            margin-top: -0.2vh;
            word-spacing: 8px;
        }

        .topo-cronometro-titulo {
            position: absolute;
            top: -3.5vh;
            display: flex;
            align-items: center;
            gap: 0.5vw;
            font-size: 1.6vw;
            letter-spacing: 2px;
        }

        /* ==========================================
           PARTE INFERIOR
        ========================================== */
        .bloco-inferior {
            text-align: center;
            width: 100%;
            padding-bottom: 2vh;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2vw;
        }

        .linha-frase {
            flex: 1;
            height: 3px;
            background: linear-gradient(90deg, transparent, #e60000, transparent);
        }

        .frase-efeito {
            font-family: 'Permanent Marker', cursive; 
            font-size: 4.5vw;
            letter-spacing: 3px;
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 1);
            white-space: nowrap;
        }

    </style>
</head>
<body>

    <div class="moldura-painel"></div>

    <div class="painel-principal">
        
        <div class="bloco-esquerda">
            <div class="info-grupo">
                <div class="header-section txt-vermelho">
                    <i class="fa-solid fa-clock"></i> <span>Hora</span>
                </div>
                <span id="txt-hora" class="valor-digital txt-branco">00:00:00</span>
                <div class="glow-line"></div>
            </div>
            
            <div class="info-grupo">
                <div class="header-section txt-vermelho">
                    <i class="fa-solid fa-calendar-days"></i> <span>Data</span>
                </div>
                <span id="txt-data" class="valor-digital txt-branco">00/00/0000</span>
                <span id="txt-dia-semana" class="sub-data-dia txt-vermelho">...</span>
            </div>
        </div>

        <div class="divisoria"></div>

        <div class="bloco-centro">
            <img src="logoht.png" alt="Logo CT" class="logo-ct">
            <div class="sub-logo-texto">
                <h2><span class="txt-vermelho">HR</span><span class="txt-branco">FIGHTTEAM</span></h2>
                <p>DISCIPLINA  •  FOCO  •  EVOLUÇÃO</p>
            </div>
        </div>

        <div class="divisoria"></div>

        <div class="bloco-direita">
            <div class="timer-container">
                <div class="topo-cronometro-titulo txt-vermelho">
                    <i class="fa-solid fa-stopwatch"></i> <span>CRONÔMETRO</span>
                </div>
                <svg viewBox="0 0 160 160">
                    <circle class="circle-ticks" cx="80" cy="80" r="68"></circle>
                    <circle id="progresso-timer" class="circle-progress" cx="80" cy="80" r="68"></circle>
                </svg>
                <div class="cronometro-wrapper">
                    <div id="txt-cronometro" class="cronometro-texto txt-branco">00:00:00</div>
                    <div class="cronometro-legendas txt-cinza">HH MM SS</div>
                </div>
            </div>
        </div>

    </div>

    <div class="bloco-inferior">
        <div class="linha-frase"></div>
        <h1 class="frase-efeito">
            <span class="txt-vermelho">Campeão</span> 
            <span class="txt-branco">se faz</span> 
            <span class="txt-vermelho">em casa</span>
        </h1>
        <div class="linha-frase"></div>
    </div>

    <script>
        // Relógio e Data ao Vivo
        function atualizarRelogio() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            const segundos = String(agora.getSeconds()).padStart(2, '0');
            document.getElementById('txt-hora').textContent = `${horas}:${minutos}:${segundos}`;
            
            const dia = String(agora.getDate()).padStart(2, '0');
            const mes = String(agora.getMonth() + 1).padStart(2, '0');
            document.getElementById('txt-data').textContent = `${dia}/${mes}/${agora.getFullYear()}`;
            
            const diasSemana = ['Domingo', 'Segunda-Feira', 'Terça-Feira', 'Quarta-Feira', 'Quinta-Feira', 'Sexta-Feira', 'Sábado'];
            document.getElementById('txt-dia-semana').textContent = diasSemana[agora.getDay()];
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        // Cronômetro (Ajuste o tempo total em segundos aqui)
        const TEMPO_INICIAL = 1127; 
        let tempoRestante = TEMPO_INICIAL;
        const elementoCronometro = document.getElementById('txt-cronometro');
        const circuloProgresso = document.getElementById('progresso-timer');
        const perimetro = 2 * Math.PI * 68;
        
        circuloProgresso.style.strokeDasharray = perimetro;

        function formatarTempo(segundosTotais) {
            const hrs = String(Math.floor(segundosTotais / 3600)).padStart(2, '0');
            const mins = String(Math.floor((segundosTotais % 3600) / 60)).padStart(2, '0');
            const segs = String(segundosTotais % 60).padStart(2, '0');
            return `${hrs}:${mins}:${segs}`;
        }

        function atualizarCronometro() {
            elementoCronometro.textContent = formatarTempo(tempoRestante);
            const deslocamento = perimetro - ((tempoRestante / TEMPO_INICIAL) * perimetro);
            circuloProgresso.style.strokeDashoffset = deslocamento;

            if (tempoRestante > 0) {
                tempoRestante--;
            } else {
                clearInterval(intervaloTimer);
                elementoCronometro.textContent = "00:00:00";
                elementoCronometro.style.color = "#e60000";
                circuloProgresso.style.strokeDashoffset = perimetro;
            }
        }
        const intervaloTimer = setInterval(atualizarCronometro, 1000);
        atualizarCronometro();
    </script>
</body>
</html>
