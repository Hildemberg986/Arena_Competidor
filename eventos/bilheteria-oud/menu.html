<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bilheteria - Arena Competidor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e62117;
            --primary-soft: #fff1f0;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            background: var(--card);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .logo-box {
            max-width: 140px;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn-header {
            padding: 0.5rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            background: var(--card);
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-header:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-header.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .btn-header i {
            font-size: 0.8rem;
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .header-text {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .header-text h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary), #c81e14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            color: var(--text-light);
            margin: 8px 0 0 0;
            font-size: 1.1rem;
        }

        /* Filtros */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            background: var(--card);
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-btn i {
            font-size: 0.8rem;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Grid de Eventos */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 1rem;
        }

        @media (min-width: 1024px) {
            .events-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .event-card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.15);
        }

        /* Banner com proporção 2048:2560 (4:5) */
        .event-banner {
            width: 100%;
            position: relative;
            padding-bottom: 125%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .event-banner img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background-color: #f1f5f9;
        }

        .event-banner .banner-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: white;
            opacity: 0.8;
        }

        /* Badge de status */
        .event-badge {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        .badge-planejado {
            background: rgba(59, 130, 246, 0.95);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .badge-ativo {
            background: rgba(16, 185, 129, 0.95);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: pulse 2s infinite;
        }

        .badge-concluido {
            background: rgba(100, 116, 139, 0.95);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .badge-cancelado {
            background: rgba(239, 68, 68, 0.95);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .event-badge i {
            font-size: 0.6rem;
        }

        .event-content {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .event-content h3 {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            color: var(--text);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.6em;
        }

        .event-location {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-light);
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .event-location i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .event-info {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .event-info span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            color: var(--text-light);
            background: var(--bg);
            padding: 0.3rem 0.7rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .event-info i {
            font-size: 0.8rem;
            color: var(--primary);
        }

        .event-price {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-ativo {
            color: #10b981;
        }

        .status-ativo .status-indicator {
            background-color: #10b981;
        }

        .status-planejado {
            color: #3b82f6;
        }

        .status-planejado .status-indicator {
            background-color: #3b82f6;
        }

        .status-concluido {
            color: #64748b;
        }

        .status-concluido .status-indicator {
            background-color: #64748b;
        }

        .status-cancelado {
            color: #ef4444;
        }

        .status-cancelado .status-indicator {
            background-color: #ef4444;
        }

        /* Botão Comprar */
        .btn-comprar {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: auto;
            font-family: inherit;
        }

        .btn-comprar:hover {
            background: #c81e14;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(230, 33, 23, 0.3);
        }

        .btn-comprar:active {
            transform: translateY(0);
        }

        .btn-comprar i {
            font-size: 0.9rem;
        }

        /* Loading e Empty State */
        .loading,
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            grid-column: 1 / -1;
        }

        .loading i {
            font-size: 2.5rem;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-light);
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            margin: 0 0 0.5rem 0;
            color: var(--text);
        }

        .empty-state p {
            color: var(--text-light);
            margin: 0;
        }

        /* Seção de Destaque */
        .featured-section {
            margin-top: 3rem;
            background: linear-gradient(135deg, var(--primary), #c81e14);
            border-radius: 20px;
            padding: 2rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .featured-text h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 0 0.2rem 0;
        }

        .featured-text p {
            opacity: 0.95;
            margin: 0;
            font-size: 0.95rem;
        }

        .featured-btn {
            background: white;
            color: var(--primary);
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .featured-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 3rem 1rem 1.5rem;
            color: var(--text-light);
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-text h1 {
                font-size: 1.6rem;
            }

            .events-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }

            .event-content h3 {
                font-size: 0.9rem;
            }

            .event-info span {
                font-size: 0.7rem;
            }

            .featured-section {
                padding: 1.2rem;
                text-align: center;
                justify-content: center;
            }

            .event-badge {
                padding: 0.3rem 0.7rem;
                font-size: 0.65rem;
            }
        }

        @media (max-width: 480px) {
            .events-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .event-banner .banner-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-box">
            <img src="../../img/arena03.png" alt="Arena Competidor">
        </div>
        <div class="header-actions">
            <a href="menu.html" class="btn-header active">
                <i class="fa-solid fa-ticket"></i> Ingressos
            </a>
            <a href="../../index.html" class="btn-header">
                <i class="fa-solid fa-home"></i> Início
            </a>
        </div>
    </header>

    <main class="container">
        <section class="header-text">
            <h1>🎫 Bilheteria Digital</h1>
            <p>Garanta seu ingresso para os melhores eventos</p>
        </section>

        <!-- Filtros com ícones -->
        <div class="filters">
            <button class="filter-btn active" data-filter="todos">
                <i class="fa-solid fa-list"></i> Todos
            </button>
            <button class="filter-btn" data-filter="planejado">
                <i class="fa-solid fa-calendar-plus"></i> Planejados
            </button>
            <button class="filter-btn" data-filter="ativo">
                <i class="fa-solid fa-circle"></i> Ativos
            </button>
            <button class="filter-btn" data-filter="concluido">
                <i class="fa-solid fa-check-circle"></i> Concluídos
            </button>
            <button class="filter-btn" data-filter="cancelado">
                <i class="fa-solid fa-ban"></i> Cancelados
            </button>
        </div>

        <!-- Grid de Eventos -->
        <div id="eventsContainer">
            <div class="loading">
                <i class="fa-solid fa-spinner"></i>
                <p>Carregando eventos...</p>
            </div>
        </div>

        <!-- Seção Destaque -->
        <div class="featured-section" id="featuredSection" style="display: none;">
            <div class="featured-text">
                <h2>🔥 Evento em Destaque</h2>
                <p id="featuredDescription">Garanta já seu ingresso!</p>
            </div>
            <a href="#" class="featured-btn" id="featuredButton">
                <i class="fa-solid fa-ticket"></i> Ver detalhes
            </a>
        </div>
    </main>

    <footer>
        Arena Competidor &copy; 2026 &bull; Todos os direitos reservados &bull; Bilheteria Digital
    </footer>

    <script>
        

        let allEvents = [];
        let currentFilter = 'todos';

        function formatDate(dateString) {
            if (!dateString) return 'Data não definida';
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        function getStatusBadge(status) {
            const statusMap = {
                'planejado': {
                    class: 'badge-planejado',
                    icon: 'fa-calendar-plus',
                    label: 'Planejado'
                },
                'ativo': {
                    class: 'badge-ativo',
                    icon: 'fa-circle',
                    label: 'Ativo'
                },
                'concluido': {
                    class: 'badge-concluido',
                    icon: 'fa-check-circle',
                    label: 'Concluído'
                },
                'cancelado': {
                    class: 'badge-cancelado',
                    icon: 'fa-ban',
                    label: 'Cancelado'
                }
            };

            const info = statusMap[status] || statusMap['planejado'];
            return `
                <div class="event-badge ${info.class}">
                    <i class="fa-solid ${info.icon}"></i> ${info.label}
                </div>`;
        }

        function getEventIcon(event) {
            const icons = [
                'fa-trophy',
                'fa-medal',
                'fa-crown',
                'fa-star',
                'fa-fire',
                'fa-futbol',
                'fa-basketball',
                'fa-music'
            ];
            return icons[event.id % icons.length];
        }

        function getStatusColor(status) {
            const colors = {
                'ativo': 'status-ativo',
                'planejado': 'status-planejado',
                'concluido': 'status-concluido',
                'cancelado': 'status-cancelado'
            };
            return colors[status] || 'status-planejado';
        }

        function createEventCard(event) {
            const bannerHtml = event.banner_url
                ? `<img src="${event.banner_url}" alt="Banner do evento ${event.nome_campeonato}" loading="lazy">`
                : `<i class="fa-solid ${getEventIcon(event)} banner-icon"></i>`;

            const bannerStyle = event.banner_url
                ? ''
                : `background: linear-gradient(135deg, #${Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0')} 0%, #${Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0')} 100%);`;

            const statusTexts = {
                'ativo': '🎟️ Disponível',
                'planejado': '📅 Em Breve',
                'concluido': '✅ Realizado',
                'cancelado': '❌ Cancelado'
            };

            // Texto do botão baseado no status
            const buttonText = event.status === 'ativo'
                ? '<i class="fa-solid fa-cart-shopping"></i> Comprar Ingresso'
                : event.status === 'planejado'
                    ? '<i class="fa-solid fa-clock"></i> Ver Detalhes'
                    : '<i class="fa-solid fa-info-circle"></i> Ver Detalhes';

            return `
            <div class="event-card" onclick="irParaDetalhes(${event.id})">
                <div class="event-banner" style="${bannerStyle}">
                    ${bannerHtml}
                    ${getStatusBadge(event.status)}
                </div>
                <div class="event-content">
                    <h3>${event.nome_campeonato || 'Evento sem nome'}</h3>
                    <div class="event-location">
                        <i class="fa-solid fa-location-dot"></i>
                        ${event.local || event.cidade || 'Local não definido'}${event.cidade ? `, ${event.cidade}` : ''}${event.estado ? ` - ${event.estado}` : ''}
                    </div>
                    <div class="event-info">
                        <span>
                            <i class="fa-regular fa-calendar"></i> 
                            ${formatDate(event.data_inicio)} - ${formatDate(event.data_fim)}
                        </span>
                        ${event.organizador ? `
                        <span>
                            <i class="fa-solid fa-user"></i> ${event.organizador}
                        </span>` : ''}
                    </div>
                    <!-- <div class="event-price ${getStatusColor(event.status)}">
                        <span class="status-indicator"></span>
                        ${statusTexts[event.status] || '📅 Em Breve'}
                    </div> -->
                    <button class="btn-comprar" onclick="event.stopPropagation(); irParaDetalhes(${event.id})">
                        ${buttonText}
                    </button>
                </div>
            </div>`;
        }

        // Função única para ir para detalhes
        function irParaDetalhes(id) {
            localStorage.setItem('currentChampionshipId', id);
            window.location.href = `campeonato.html?id=${id}`;
        }

        async function loadEvents() {
            const container = document.getElementById('eventsContainer');
            try {
                console.log('🔄 Buscando eventos em:', API_URL);
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                console.log('✅ Dados recebidos:', data);
                if (data.status === 'success' && data.data) {
                    allEvents = data.data;
                    renderEvents(allEvents);
                    updateFeaturedSection(allEvents);
                } else {
                    throw new Error('Dados inválidos recebidos da API');
                }
            } catch (error) {
                console.error('❌ Erro ao carregar eventos:', error);
                container.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <h3>Erro ao carregar eventos</h3>
                    <p>Não foi possível carregar os eventos. Tente novamente mais tarde.</p>
                    <p style="font-size:0.8rem;color:var(--text-light);margin-top:0.5rem;">
                        <strong>URL:</strong> ${API_URL}
                    </p>
                    <button onclick="loadEvents()" style="margin-top:1rem;padding:0.6rem 1.5rem;background:var(--primary);color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;">
                        <i class="fa-solid fa-rotate"></i> Tentar novamente
                    </button>
                </div>`;
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('eventsContainer');
            if (!events || events.length === 0) {
                container.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-ticket"></i>
                    <h3>Nenhum evento disponível</h3>
                    <p>No momento não há eventos cadastrados. Volte em breve!</p>
                </div>`;
                return;
            }

            const filtered = currentFilter === 'todos'
                ? events
                : events.filter(e => e.status === currentFilter);

            if (filtered.length === 0) {
                container.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-filter"></i>
                    <h3>Nenhum evento com este status</h3>
                    <p>Tente selecionar outro filtro.</p>
                </div>`;
                return;
            }

            container.innerHTML = `
            <div class="events-grid">
                ${filtered.map(event => createEventCard(event)).join('')}
            </div>`;
        }

        function updateFeaturedSection(events) {
            const section = document.getElementById('featuredSection');
            const activeEvents = events.filter(e => e.status === 'ativo');

            if (activeEvents.length > 0) {
                const featured = activeEvents[0];
                section.style.display = 'flex';
                document.getElementById('featuredDescription').textContent =
                    `Ingressos disponíveis para ${featured.nome_campeonato} em ${featured.local || featured.cidade}`;
                document.getElementById('featuredButton').onclick = (e) => {
                    e.preventDefault();
                    irParaDetalhes(featured.id);
                };
            } else if (events.length > 0) {
                const firstEvent = events[0];
                section.style.display = 'flex';
                document.getElementById('featuredDescription').textContent =
                    `Confira ${firstEvent.nome_campeonato} - ${firstEvent.status === 'planejado' ? 'Em breve' : 'Saiba mais'}`;
                document.getElementById('featuredButton').onclick = (e) => {
                    e.preventDefault();
                    irParaDetalhes(firstEvent.id);
                };
            } else {
                section.style.display = 'none';
            }
        }

        // Configurar filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderEvents(allEvents);
            });
        });

        // Carregar eventos ao iniciar
        document.addEventListener('DOMContentLoaded', loadEvents);
    </script>

</body>

</html>
