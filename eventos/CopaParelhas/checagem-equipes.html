
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checagem por Equipes | Arena Competidor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CONFIGURAÇÕES TEMA SENOGI (MANTIDAS)
           ========================================= */
        :root {
            --primary-color: #2563eb; 
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-secondary: #6b7280;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%; text-align: center; padding: 15px 0;
            background-color: #000; position: fixed; top: 0; z-index: 1000;
        }
        header img { max-width: 250px; width: 80%; height: auto; }

        /* =========================================
           CONTEÚDO PRINCIPAL
           ========================================= */
        .main-content {
            margin-top: 140px;
            width: 90%;
            max-width: 1000px;
            padding-bottom: 60px;
            text-align: center;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            color: #111827;
            font-weight: 700; font-size: 2rem;
            margin-bottom: 40px;
        }

        /* ACORDEÃO DE EQUIPES */
        .accordion-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid #e5e7eb;
            text-align: left;
        }

        .accordion-header {
            padding: 20px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            transition: background 0.2s;
        }

        .accordion-header:hover { background: #f8fafc; }

        .team-info h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            color: var(--primary-color);
            margin: 0;
        }

        .team-info p {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-green);
            margin: 4px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .accordion-header::after {
            content: '+';
            font-size: 1.5rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .accordion-header.active::after { content: '-'; }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: #fff;
        }

        .accordion-content.open {
            max-height: 5000px; /* Expansível para muitos atletas */
            padding: 0 25px 25px;
            border-top: 1px solid #f3f4f6;
        }

        /* TABELA */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { 
            text-align: left; padding: 12px; 
            font-size: 0.75rem; color: var(--text-secondary); 
            text-transform: uppercase; border-bottom: 2px solid #f3f4f6; 
        }
        td { padding: 14px 12px; border-bottom: 1px solid #f3f4f6; font-size: 0.9rem; }

        /* STATUS */
        .status-pago, .status-confirmado { color: var(--accent-green); font-weight: 700; }
        .status-pendente { color: var(--accent-red); font-weight: 700; }
        .status-em-analise { color: #f59e0b; font-weight: 700; }

        .link-voltar {
            display: inline-block;
            margin-top: 40px;
            padding: 14px 30px;
            background-color: #111827;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .link-voltar:hover {
            background-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        #loading-message {
            padding: 50px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .footer {
            margin-top: auto;
            padding: 30px 0;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .main-content { margin-top: 110px; }
            h1 { font-size: 1.6rem; }
            .accordion-header { padding: 15px 20px; }
            .team-info h2 { font-size: 1.1rem; }
            
            thead { display: none; }
            tr { display: block; border-bottom: 2px solid #f3f4f6; padding: 10px 0; }
            td { display: flex; justify-content: space-between; border: none; padding: 6px 0; }
            td::before { content: attr(data-label); font-weight: 700; color: var(--text-secondary); font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../../index.html">
            <img src="../../img/arena2.png" alt="Arena Competidor Logo">
        </a>
    </header>

    <div class="main-content">
        <h1>Checagem por Equipes</h1>

        <div id="loading-message">Sincronizando banco de dados...</div>
        
        <div id="listaEquipes"></div>
        
        <a href="checagem.html" class="link-voltar">Voltar para Opções</a>
    </div>

    <div class="footer">
        &copy; 2026 Arena Competidor. Todos os direitos reservados.
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR-vA56MYMX26cXwTVniRzNQewNHRgqCNPkHAsJKq2GErGCCzN-AaLHBs63b4DkE5nJtbWcIHKH7z5M/pub?output=csv';
        
        const listaEquipesDiv = document.getElementById('listaEquipes');
        const loadingMessage = document.getElementById('loading-message');
        
        let inscritosPorEquipe = {};

        function normalizeText(text) {
            return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(/\s+/g, '-');
        }
        
        function normalizeStatus(text) {
            let status = normalizeText(text.replace(' ', '-'));
            if (status.includes('pago') || status.includes('confirmado')) return 'status-pago';
            if (status.includes('pendente')) return 'status-pendente';
            if (status.includes('analise')) return 'status-em-analise'; 
            return 'status-pendente'; 
        }
        
        async function fetchAndProcessData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== '');
                
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                const data = lines.slice(1).map(line => {
                    const values = line.split(','); 
                    const atleta = {};
                    headers.forEach((header, i) => {
                        atleta[header] = values[i] ? values[i].replace(/"/g, '').trim() : '';
                    });
                    return atleta;
                });

                groupAndRenderEquipes(data);

            } catch (error) {
                loadingMessage.textContent = '❌ Erro ao carregar dados.';
            }
        }
        
        function groupAndRenderEquipes(data) {
            inscritosPorEquipe = {};

            data.forEach(atleta => {
                const nomeEquipe = atleta['SUA EQUIPE'] || 'SEM EQUIPE';
                if (!inscritosPorEquipe[nomeEquipe]) {
                    inscritosPorEquipe[nomeEquipe] = { atletas: [], total: 0 };
                }
                inscritosPorEquipe[nomeEquipe].atletas.push(atleta);
                inscritosPorEquipe[nomeEquipe].total++;
            });
            
            loadingMessage.style.display = 'none';
            renderEquipeList();
        }

        function renderEquipeList() {
            listaEquipesDiv.innerHTML = ''; 
            
            Object.keys(inscritosPorEquipe).sort().forEach(key => {
                const groupData = inscritosPorEquipe[key];
                const accordionItem = document.createElement('div');
                accordionItem.className = 'accordion-item';
                
                accordionItem.innerHTML = `
                    <div class="accordion-header" onclick="toggleAcc(this)">
                        <div class="team-info">
                            <h2>${key}</h2>
                            <p>${groupData.total} Atleta(s) Inscrito(s)</p>
                        </div>
                    </div>
                    <div class="accordion-content">
                        <table>
                            <thead>
                                <tr>
                                    <th>Atleta</th>
                                    <th>Faixa</th>
                                    <th>Peso</th>
                                    <th>Categoria</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${groupData.atletas.map(atleta => `
                                    <tr>
                                        <td data-label="Atleta">${atleta['NOME COMPLETO']}</td>
                                        <td data-label="Faixa">${atleta['SUA FAIXA']}</td>
                                        <td data-label="Peso">${atleta['SEU PESO']}</td>
                                        <td data-label="Categoria">${atleta['SUA CATEGORIA']}</td>
                                        <td data-label="Status" class="${normalizeStatus(atleta['STATUS DO PAGAMENTO'])}">
                                            ${atleta['STATUS DO PAGAMENTO']}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `; 
                listaEquipesDiv.appendChild(accordionItem);
            });
        }
        
        function toggleAcc(el) {
            // Fecha outros acordeões
            document.querySelectorAll('.accordion-header').forEach(header => {
                if (header !== el && header.classList.contains('active')) {
                    header.classList.remove('active');
                    header.nextElementSibling.classList.remove('open');
                }
            });

            // Abre o selecionado
            el.classList.toggle('active');
            el.nextElementSibling.classList.toggle('open');
        }

        document.addEventListener('DOMContentLoaded', fetchAndProcessData);
    </script>
</body>
</html>
