<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checagem de Inscritos | Arena Competidor</title>
    <style>
        /* Importa a fonte Roboto */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        /* ====================================================================
           1. VARIÁVEIS CSS (ROOT)
           ==================================================================== */
        :root {
            /* Cores de Destaque */
            --cor-primaria: #007bff; /* Azul Vivo para destaque (botões, títulos) */
            --cor-secundaria: #343a40; /* Cinza Escuro para texto e fundos principais */
            --cor-destaque: #28a745; /* Verde Pago/Confirmado */
            
            /* Cores de Fundo e Texto */
            --cor-fundo: #f8f9fa; /* Cinza Claro Fundo */
            --cor-texto: #495057; /* Cinza para Textos */
            --cor-borda: #dee2e6; /* Cinza Suave para Bordas */
            --cor-header-fundo: #000; /* Preto para o Header */
            
            /* Cores de Status */
            --status-analise: #ffc107; /* Amarelo (Em Análise) */
            --status-pendente: #dc3545; /* Vermelho (Pendente) */
            --status-confirmado: var(--cor-destaque);
        }

        /* ====================================================================
           2. LAYOUT E BASE
           ==================================================================== */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* TÍTULOS E MENSAGENS */
        h1 {
            color: var(--cor-primaria); /* Usando o azul de destaque */
            font-weight: 900;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        #loading-message {
            margin-top: 50px;
            font-size: 1.5rem;
            color: var(--cor-secundaria);
        }

        .footer {
            margin-top: auto;
            padding: 20px 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: #6c757d;
        }

        /* STATUS */
        .status-pago, .status-confirmado { 
            color: var(--cor-destaque); 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }
        .status-pendente { 
            color: var(--status-pendente); 
            font-weight: 700; 
        }
        .status-em-analise { 
            color: var(--status-analise); 
            font-weight: 700; 
        }

        /* ====================================================================
           3. HEADER E CONTEÚDO PRINCIPAL
           ==================================================================== */
        header {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background-color: var(--cor-header-fundo);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* Sombra mais visível */
        }

        header img {
            max-width: 200px;
        }

        .main-content {
            margin-top: 150px; /* Espaço para o header fixo */
            width: 95%;
            max-width: 1200px;
            text-align: center;
            flex-grow: 1;
        }

        /* ====================================================================
           4. FILTROS
           ==================================================================== */
        .filtros {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px; /* Cantos mais arredondados */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end; /* Alinha labels no topo */
            flex-wrap: wrap;
        }

        .filtro-grupo {
            display: flex;
            flex-direction: column;
            margin: 10px;
            min-width: 150px; /* Garante que os selects não fiquem muito estreitos */
        }

        label {
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--cor-secundaria);
            font-size: 0.95rem;
        }

        select {
            padding: 10px;
            border: 1px solid var(--cor-borda);
            border-radius: 6px;
            font-size: 1rem;
            background-color: var(--cor-fundo);
            transition: border-color 0.3s ease;
        }

        select:focus {
            border-color: var(--cor-primaria);
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
        }
        
        /* ====================================================================
           5. ACORDEÃO (GRUPOS DE INSCRIÇÃO)
           ==================================================================== */
        .accordion-item {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); /* Sombra suave para separar os itens */
        }
        
        .accordion-header {
            background-color: var(--cor-secundaria);
            color: #fff;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 1.15em;
            font-weight: 700;
            text-align: left;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s ease;
        }

        .accordion-header:hover {
            background-color: #495057; /* Cinza um pouco mais claro no hover */
        }
        
        .accordion-header::after {
            content: '▼'; 
            font-weight: bold;
            font-size: 0.8em;
            transition: transform 0.3s ease;
        }

        .accordion-header.active::after {
            transform: rotate(180deg);
        }

        .accordion-content {
            background-color: #fff;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, padding 0.4s ease-in-out;
            max-height: 0;
            padding: 0 20px;
        }

        .accordion-content.open {
            max-height: 50000px; /* Valor alto para transição suave */
            padding: 20px;
        }
        
        /* ====================================================================
           6. TABELA DE ATLETAS (DESKTOP)
           ==================================================================== */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            margin-bottom: 0;
            border-radius: 0 0 8px 8px; /* Arredondado se o content estiver aberto */
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--cor-borda);
        }

        thead {
            background-color: #e9ecef;
            color: var(--cor-secundaria);
            font-weight: 700;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* ====================================================================
           7. MEDIA QUERY (MOBILE) - Prioridade Estética
           ==================================================================== */

        @media (max-width: 768px) {
            
            /* Ajustes de Layout */
            .main-content {
                margin-top: 20px; 
                width: 100%;
                padding: 0 10px;
            }
            
            header {
                padding: 15px 0;
                position: static; /* Header estático para liberar espaço no topo */
            }

            header img {
                max-width: 130px;
            }

            h1 {
                font-size: 1.6rem;
                margin-bottom: 15px;
            }

            /* Otimização dos Filtros */
            .filtros {
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
                margin-bottom: 20px;
            }

            .filtro-grupo {
                margin: 8px 0;
                min-width: auto;
            }
            
            select {
                padding: 12px; /* Maior para toque */
            }
            
            /* Otimização do Acordeão */
            .accordion-item {
                margin-bottom: 10px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            }
            
            .accordion-header {
                padding: 12px 15px;
                font-size: 1.05rem;
            }

            .accordion-content.open {
                padding: 15px; /* Padding interno menor e ajustado */
            }

            /* Reestruturação da Tabela para Cartões (Cards) */
            table {
                display: block;
                box-shadow: none; /* Remove a sombra extra */
            }
            
            thead {
                display: none;
            }

            tr {
                display: flex;
                flex-direction: column;
                background-color: #fff;
                /* Removido box-shadow e padding, pois são aplicados no accordion-item */
                padding: 10px; /* Padding interno de cada card */
                margin-bottom: 0;
                border-radius: 0;
                border: 1px solid #f1f1f1;
            }
            
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px dotted #eee; /* Linha pontilhada suave */
                padding: 8px 0;
                width: 100%;
            }
            
            td:last-child {
                border-bottom: none;
            }

            td::before {
                content: attr(data-label);
                font-weight: 700;
                flex-shrink: 0;
                text-align: left;
                color: var(--cor-secundaria);
                min-width: 90px; /* Ajuda a alinhar o texto do valor */
            }

            /* Alinhamento dos valores/statuses */
            .status-pago, .status-pendente, .status-em-analise, .status-confirmado,
            td:not(:first-child):not(:last-child) {
                flex-grow: 1;
                text-align: right;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="../../index.html">
        <img src="../../img/arena2.png" alt="Arena Competidor Logo">
        </a>
    </header>

    <div class="main-content">
        <h1>Checagem de Inscritos (Somente Confirmados)</h1>

        <div class="filtros">
            <div class="filtro-grupo">
                <label for="filtroGenero">Gênero:</label>
                <select id="filtroGenero">
                    <option value="todos">Todos</option>
                </select>
            </div>
            <div class="filtro-grupo">
                <label for="filtroCategoria">Categoria de Idade:</label>
                <select id="filtroCategoria">
                    <option value="todos">Todos</option>
                </select>
            </div>
            <div class="filtro-grupo">
                <label for="filtroFaixa">Faixa:</label>
                <select id="filtroFaixa">
                    <option value="todos">Todos</option>
                </select>
            </div>
            <div class="filtro-grupo">
                <label for="filtroPeso">Peso:</label>
                <select id="filtroPeso">
                    <option value="todos">Todos</option>
                </select>
            </div>
        </div>

        <div id="loading-message">Carregando dados da planilha...</div>
        <div id="listaInscritos">
        </div>
    </div>

    <div class="footer">
        &copy; 2025 Arena Competidor. Todos os direitos reservados.
    </div>

    <script>
        // 🚨 URL DO CSV DA PLANILHA GOOGLE
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQSl2JnuwCFfho7DTlBoeMwtIgLi7sJim55WnJcgTi0s28JC8lhZwkt69MdVlLEMcfkSQBKR1R2ziMR/pub?output=csv';
        
        // ====================================================================
        // 🚨 CONFIGURAÇÃO DE COLUNAS DA PLANILHA
        // ====================================================================
        const NOME_COLUNA_STATUS = 'STATUS DO PAGAMENTO';
        const NOME_COLUNA_PROFESSOR = 'PROFESSOR';
        // ⚠️ ATENÇÃO: SUBSTITUA 'ORDEM NA PLANILHA' PELO NOME EXATO DA SUA COLUNA DE ORDEM
        const NOME_COLUNA_ORDEM = 'ORD'; 
        // Se sua coluna se chama 'Timestamp' ou 'ID', use esse nome aqui.
        // Se ela se chama 'ORD', use 'ORD' aqui.
        // ====================================================================

        const listaInscritosDiv = document.getElementById('listaInscritos');
        const loadingMessage = document.getElementById('loading-message');
        const filtroGenero = document.getElementById('filtroGenero');
        const filtroCategoria = document.getElementById('filtroCategoria');
        const filtroFaixa = document.getElementById('filtroFaixa');
        const filtroPeso = document.getElementById('filtroPeso');
        const filters = [filtroGenero, filtroCategoria, filtroFaixa, filtroPeso];
        
        
        let inscritosAgrupados = {};

        // Funções de Normalização
        function normalizeText(text) {
            return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(/\s+/g, '-');
        }

        function normalizeCategoria(text) {
            return normalizeText(text.split(/\s+-\s*|\s+/)[0]);
        }
        
        function normalizeFaixa(text) {
            return normalizeText(text);
        }

        function normalizePeso(text) {
            const parts = text.split('/')[0];
            return normalizeText(parts.split('até')[0]);
        }
        
        function normalizeStatus(text) {
            let status = normalizeText(text.replace(' ', '-'));
            if (status === 'pago') return 'status-pago';
            if (status === 'confirmado') return 'status-confirmado'; 
            if (status === 'pendente') return 'status-pendente';
            if (status.includes('analise')) return 'status-em-analise'; 
            return 'status-pendente'; 
        }
        
        // Função Principal de Processamento do CSV
        async function fetchAndProcessData() {
            loadingMessage.textContent = 'Carregando dados da planilha...';
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== '');
                if (lines.length < 2) {
                    loadingMessage.textContent = 'Nenhum dado encontrado na planilha.';
                    return;
                }
                
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                const data = lines.slice(1).map(line => {
                    const values = line.match(/(?:[^,"]+|"[^"]*")+/g) || []; 
                    
                    const atleta = {};
                    headers.forEach((header, i) => {
                        atleta[header] = values[i] ? values[i].replace(/"/g, '').trim() : '';
                    });
                    return atleta;
                });
                
                groupAndRenderData(data);

            } catch (error) {
                console.error('Erro ao buscar ou processar CSV:', error);
                loadingMessage.textContent = '❌ Erro ao carregar dados. Verifique o link ou a permissão da planilha.';
            }
        }
        
        function groupAndRenderData(data) {
            const filteredData = data.filter(atleta => {
                const statusText = atleta[NOME_COLUNA_STATUS] || 'Pendente';
                return normalizeText(statusText) === 'confirmado' || normalizeText(statusText) === 'pago';
            });

            inscritosAgrupados = {};
            const availableFilters = {
                'filtroGenero': new Set(),
                'filtroCategoria': new Set(),
                'filtroFaixa': new Set(),
                'filtroPeso': new Set(),
            };

            filteredData.forEach(atleta => { 
                const sexo = atleta['SEXO'];
                const categoria = atleta['SUA CATEGORIA'];
                const faixa = atleta['SUA FAIXA'];
                const peso = atleta['SEU PESO'];

                const key = `${categoria} - FAIXA ${faixa} - ${peso} - ${sexo}`;
                
                if (!inscritosAgrupados[key]) {
                    inscritosAgrupados[key] = {
                        atletas: [],
                        normalized: {
                            sexo: normalizeText(sexo),
                            categoria: normalizeCategoria(categoria),
                            faixa: normalizeFaixa(faixa),
                            peso: normalizePeso(peso)
                        }
                    };
                }
                inscritosAgrupados[key].atletas.push(atleta);

                // Popular opções de filtro
                availableFilters['filtroGenero'].add(sexo);
                availableFilters['filtroCategoria'].add(categoria);
                availableFilters['filtroFaixa'].add(faixa);
                availableFilters['filtroPeso'].add(peso);
            });
            
            loadingMessage.style.display = 'none';
            renderInscritos();
            populateFilters(availableFilters);
        }

        function populateFilters(availableFilters) {
            Object.keys(availableFilters).forEach(filterId => {
                const selectElement = document.getElementById(filterId);
                const options = Array.from(availableFilters[filterId]).sort();
                
                selectElement.innerHTML = '<option value="todos">Todos</option>';
                
                options.forEach(optionText => {
                    const option = document.createElement('option');
                    
                    let optionValue;
                    if (filterId === 'filtroCategoria') {
                        optionValue = normalizeCategoria(optionText);
                    } else if (filterId === 'filtroFaixa') {
                        optionValue = normalizeFaixa(optionText);
                    } else if (filterId === 'filtroPeso') {
                        optionValue = normalizePeso(optionText);
                    } else { // Genero
                        optionValue = normalizeText(optionText);
                    }
                    
                    option.value = optionValue;
                    option.textContent = optionText;
                    selectElement.appendChild(option);
                });
            });
        }


        function renderInscritos() {
            listaInscritosDiv.innerHTML = ''; 
            
            const sortedKeys = Object.keys(inscritosAgrupados).sort();

            if (sortedKeys.length === 0) {
                 listaInscritosDiv.innerHTML = '<p style="font-size: 1.2rem; color: var(--cor-secundaria);">Nenhum atleta com status CONFIRMADO encontrado ou as colunas da planilha estão incorretas.</p>';
                 return;
            }

            sortedKeys.forEach(key => {
                const groupData = inscritosAgrupados[key];
                const normalized = groupData.normalized;
                
                const accordionItem = document.createElement('div');
                accordionItem.className = 'accordion-item sub-group';
                accordionItem.dataset.sexo = normalized.sexo;
                accordionItem.dataset.categoria = normalized.categoria;
                accordionItem.dataset.faixa = normalized.faixa;
                accordionItem.dataset.peso = normalized.peso;
                
                const header = document.createElement('div');
                header.className = 'accordion-header';
                header.textContent = key; 
                
                const content = document.createElement('div');
                content.className = 'accordion-content';
                
                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>ORD</th> 
                            <th>Nome</th>
                            <th>Equipe</th>
                            <th>Professor</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;
                const tbody = table.querySelector('tbody');

                // Removida a variável 'order' de incremento.
                groupData.atletas.forEach(atleta => {
                    const statusClass = normalizeStatus(atleta[NOME_COLUNA_STATUS]);
                    const statusText = atleta[NOME_COLUNA_STATUS] || 'Pendente'; 
                    const professor = atleta[NOME_COLUNA_PROFESSOR] || 'N/A';
                    
                    // 🚨 NOVO: Obtendo o número de ordem diretamente da coluna da planilha
                    const ordemDaPlanilha = atleta[NOME_COLUNA_ORDEM] || 'N/A';
                    
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td data-label="ORD">${ordemDaPlanilha}</td> 
                        <td data-label="Nome">${atleta['NOME COMPLETO']}</td>
                        <td data-label="Equipe">${atleta['SUA EQUIPE']}</td>
                        <td data-label="Professor">${professor}</td> 
                        <td data-label="Status" class="${statusClass}">${statusText}</td>
                    `;
                    tbody.appendChild(row);
                });
                
                content.appendChild(table);
                accordionItem.appendChild(header);
                accordionItem.appendChild(content);
                listaInscritosDiv.appendChild(accordionItem);
            });
            
            setupAccordion(); 
            atualizarVisibilidade(); 
        }
        
        // --- Lógica de Filtro e Acordeão ---

        function atualizarVisibilidade() {
            const generoSelecionado = filtroGenero.value;
            const categoriaSelecionada = filtroCategoria.value;
            const faixaSelecionada = filtroFaixa.value;
            const pesoSelecionado = filtroPeso.value;
            
            const subGroups = listaInscritosDiv.querySelectorAll('.sub-group');
            let foundVisible = false;

            subGroups.forEach(group => {
                const grupoGenero = group.dataset.sexo;
                const grupoCategoria = group.dataset.categoria;
                const grupoFaixa = group.dataset.faixa;
                const grupoPeso = group.dataset.peso;

                const showGenero = generoSelecionado === 'todos' || grupoGenero === generoSelecionado;
                const showCategoria = categoriaSelecionada === 'todos' || grupoCategoria === categoriaSelecionada;
                const showFaixa = faixaSelecionada === 'todos' || grupoFaixa === faixaSelecionada;
                const showPeso = pesoSelecionado === 'todos' || grupoPeso === pesoSelecionado;

                if (showGenero && showCategoria && showFaixa && showPeso) {
                    group.style.display = 'block';
                    foundVisible = true;
                } else {
                    group.style.display = 'none';
                    group.querySelector('.accordion-header')?.classList.remove('active');
                    group.querySelector('.accordion-content')?.classList.remove('open');
                }
            });
            
            const notFoundMessage = listaInscritosDiv.querySelector('#not-found-message');
            if (!foundVisible && !notFoundMessage) {
                const p = document.createElement('p');
                p.id = 'not-found-message';
                p.style.fontSize = '1.2rem';
                p.style.color = 'var(--status-pendente)';
                p.textContent = 'Nenhum grupo encontrado com os filtros selecionados.';
                listaInscritosDiv.appendChild(p);
            } else if (foundVisible && notFoundMessage) {
                notFoundMessage.remove();
            }
        }

        function setupAccordion() {
            const accordionHeaders = listaInscritosDiv.querySelectorAll('.accordion-header');
            
            accordionHeaders.forEach(header => {
                header.removeEventListener('click', handleAccordionClick); 
                header.addEventListener('click', handleAccordionClick);
            });
        }
        
        function handleAccordionClick(event) {
             const header = event.currentTarget;
             const content = header.nextElementSibling;
                      
             listaInscritosDiv.querySelectorAll('.accordion-header').forEach(otherHeader => {
                 if (otherHeader !== header && otherHeader.classList.contains('active')) {
                     otherHeader.classList.remove('active');
                     otherHeader.nextElementSibling.classList.remove('open');
                 }
             });

             header.classList.toggle('active');
             content.classList.toggle('open');
        }

        // Adiciona listeners aos filtros
        filters.forEach(filter => filter.addEventListener('change', atualizarVisibilidade));

        // Inicializa o carregamento dos dados
        document.addEventListener('DOMContentLoaded', fetchAndProcessData);
    </script>
</body>
</html>
