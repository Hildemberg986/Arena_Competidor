<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checagem Absoluto (Somente Confirmados) | Arena Competidor</title>
    <style>
        /* Importa a fonte Roboto */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        /* ====================================================================
           1. VARIÁVEIS CSS (ROOT) - Cores Aprimoradas
           ==================================================================== */
        :root {
            /* Cor para o cabeçalho do acordeão e textos principais */
            --cor-primaria: #343a40; 
            /* Cor para títulos, botões e elementos de destaque */
            --cor-secundaria: #007bff; 
            /* Verde para status Confirmado/Pago */
            --cor-destaque: #28a745; 
            /* Cinza Claro Fundo */
            --cor-fundo: #f8f9fa; 
            /* Cinza Escuro para textos */
            --cor-texto: #495057; 
            /* Cinza para Bordas */
            --cor-borda: #dee2e6; 
            /* Amarelo (Em Análise) */
            --status-analise: #ffc107; 
            /* Vermelho (Pendente) */
            --status-pendente: #dc3545; 
            --cor-header-fundo: #000;
            --status-confirmado: var(--cor-destaque);
        }

        /* ====================================================================
           2. LAYOUT E BASE
           ==================================================================== */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background-color: var(--cor-header-fundo);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); /* Sombra mais forte */
        }

        header img {
            max-width: 200px;
        }

        .main-content {
            margin-top: 150px;
            width: 95%;
            max-width: 1200px;
            text-align: center;
            flex-grow: 1;
        }

        h1 {
            color: var(--cor-secundaria); /* Usando a cor de destaque (azul) */
            font-weight: 900; /* Mais impacto */
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        #loading-message {
            margin-top: 50px;
            font-size: 1.5rem;
            color: var(--cor-primaria);
        }

        .footer {
            margin-top: auto;
            padding: 20px 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: #6c757d;
        }

        /* ====================================================================
           3. ACORDEÃO E TABELA
           ==================================================================== */
        .accordion-item {
            width: 100%;
            margin-bottom: 15px; /* Espaçamento reduzido para visual mais compacto */
        }
        
        .accordion-header {
            background-color: var(--cor-primaria);
            color: #fff;
            padding: 18px 25px; /* Padding maior para melhor toque/clique */
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.25em; /* Fonte um pouco maior */
            font-weight: 700;
            text-align: left;
            user-select: none; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .accordion-header:hover {
            background-color: #495057; /* Cor levemente mais clara no hover */
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
        }
        
        .accordion-header::after {
            content: '▼'; /* Novo ícone de seta */
            font-weight: bold;
            font-size: 0.9em;
            transition: transform 0.3s ease;
        }

        .accordion-header.active::after {
            transform: rotate(180deg);
        }

        .accordion-content {
            background-color: #fff;
            border-radius: 0 0 8px 8px; /* Cantos arredondados apenas na parte inferior */
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, padding 0.4s ease-in-out;
            max-height: 0;
            padding: 0 25px;
        }

        .accordion-content.open {
            max-height: 50000px; 
            padding: 20px 25px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            margin-bottom: 0;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--cor-borda);
        }

        thead {
            background-color: #e9ecef;
            color: var(--cor-primaria); /* Cor do texto no cabeçalho da tabela */
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* Statuses */
        .status-pago, .status-confirmado { 
            color: var(--cor-destaque); 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }
        .status-pendente { 
            color: var(--status-pendente); 
            font-weight: 700; 
        }
        .status-em-analise { 
            color: var(--status-analise); 
            font-weight: 700; 
        }

        /* Botão de Voltar */
        .link-voltar {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 30px;
            background-color: var(--cor-secundaria); /* Usando o azul de destaque */
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }

        .link-voltar:hover {
            background-color: #0056b3;
        }

        /* ====================================================================
           4. MEDIA QUERY (MOBILE) - Otimização Responsiva
           ==================================================================== */
        @media (max-width: 768px) {
            .main-content {
                margin-top: 40px; /* Reduz margem no topo */
                width: 98%;
                padding: 0 10px;
            }
            
            header {
                padding: 15px 0;
                position: static; /* Não ocupa a tela no topo */
            }

            header img {
                max-width: 150px;
            }
            
            h1 {
                font-size: 2.0rem;
                margin-bottom: 25px;
            }
            
            .accordion-header {
                font-size: 1.1em;
                padding: 15px 20px;
            }

            /* Estilo do Card em Mobile */
            table {
                display: block;
            }
            
            thead {
                display: none;
            }

            tr {
                display: flex;
                flex-direction: column;
                background-color: #fff;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                padding: 15px;
                margin-bottom: 10px;
            }
            
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid #eee;
                padding: 10px 0;
                width: 100%;
            }
            
            td:last-child {
                border-bottom: none;
            }

            td::before {
                content: attr(data-label);
                font-weight: bold;
                flex-shrink: 0;
                text-align: left;
                color: var(--cor-primaria); /* Destaca o label */
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="../../index.html">
        <img src="../../img/arena2.png" alt="Arena Competidor Logo">
        </a>
    </header>

    <div class="main-content">
        <h1>Checagem de Absoluto (Somente Confirmados)</h1>

        <div id="loading-message">Carregando dados da planilha...</div>
        <div id="listaInscritosAbsoluto">
        </div>
        
        <a href="checagem.html" class="link-voltar">Voltar para Opções de Checagem</a>
    </div>

    <div class="footer">
        &copy; 2025 Arena Competidor. Todos os direitos reservados.
    </div>

    <script>
        // 🚨 URL DO CSV DA PLANILHA GOOGLE
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQSl2JnuwCFfho7DTlBoeMwtIgLi7sJim55WnJcgTi0s28JC8lhZwkt69MdVlLEMcfkSQBKR1R2ziMR/pub?output=csv';
        
        const listaInscritosDiv = document.getElementById('listaInscritosAbsoluto');
        const loadingMessage = document.getElementById('loading-message');
        
        let inscritosAbsolutoAgrupados = {};

        // Funções de Normalização
        function normalizeText(text) {
            return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(/\s+/g, '-');
        }
        
        function normalizeStatus(text) {
            let status = normalizeText(text.replace(' ', '-'));
            if (status === 'pago') return 'status-pago';
            if (status === 'confirmado') return 'status-confirmado'; 
            if (status === 'pendente') return 'status-pendente';
            if (status.includes('analise')) return 'status-em-analise'; 
            return 'status-pendente'; 
        }
        
        // Função Principal de Processamento do CSV
        async function fetchAndProcessData() {
            loadingMessage.textContent = 'Carregando dados da planilha...';
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== '');
                if (lines.length < 2) {
                    loadingMessage.textContent = 'Nenhum dado encontrado na planilha.';
                    return;
                }
                
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                // Função mais robusta para split de CSV (lida com vírgulas em dados)
                const splitCSVLine = (line) => {
                    const regex = /(?:^|,)(\"(?:[^\"]+|\"\")*\"|[^,]*)/g;
                    const values = [];
                    let match;
                    while (match = regex.exec(line)) {
                        let value = match[1];
                        if (value.startsWith('"') && value.endsWith('"')) {
                            value = value.substring(1, value.length - 1).replace(/""/g, '"');
                        }
                        values.push(value.trim());
                    }
                    return values;
                };

                // 1. Converte CSV para JSON
                const allData = lines.slice(1).map(line => {
                    const values = splitCSVLine(line);
                    const atleta = {};
                    headers.forEach((header, i) => {
                        atleta[header] = values[i] || '';
                    });
                    return atleta;
                });
                
                // 2. FILTRAGEM DUPLA: Apenas Absoluto E Confirmado
                const inscritosAbsolutoConfirmados = allData
                    .filter(atleta => atleta['ABSOLUTO'] === 'Sim') 
                    .filter(atleta => normalizeText(atleta['STATUS DO PAGAMENTO'] || 'Pendente') === 'confirmado' || normalizeText(atleta['STATUS DO PAGAMENTO'] || 'Pendente') === 'pago'); 
                    // Aceita 'pago' ou 'confirmado' como sinônimos de confirmação.

                groupAndRenderAbsolutoData(inscritosAbsolutoConfirmados);

            } catch (error) {
                console.error('Erro ao buscar ou processar CSV:', error);
                loadingMessage.textContent = '❌ Erro ao carregar dados. Verifique o link ou a permissão da planilha.';
            }
        }
        
        function groupAndRenderAbsolutoData(data) {
            inscritosAbsolutoAgrupados = {};

            if (data.length === 0) {
                 loadingMessage.textContent = 'Nenhum atleta CONFIRMADO na categoria Absoluto foi encontrado.';
                 loadingMessage.style.display = 'block';
                 return;
            }

            data.forEach(atleta => {
                const sexo = atleta['SEXO'];
                let categoriaIdade = atleta['SUA CATEGORIA']; 
                const faixa = atleta['SUA FAIXA'];
                
                // MODIFICAÇÃO PARA UNIFICAR TODAS AS CATEGORIAS MASTER
                const categoriaUpper = categoriaIdade.toUpperCase();

                if (categoriaUpper.includes('MASTER')) {
                    categoriaIdade = 'MASTER (TODAS AS IDADES)'; 
                }
                
                // Chave de agrupamento: ABSOLUTO - FAIXA - CATEGORIA - SEXO
                const key = `ABSOLUTO - FAIXA ${faixa.toUpperCase()} - ${categoriaIdade.toUpperCase()} - ${sexo.toUpperCase()}`;
                
                if (!inscritosAbsolutoAgrupados[key]) {
                    inscritosAbsolutoAgrupados[key] = {
                        atletas: [],
                    };
                }
                inscritosAbsolutoAgrupados[key].atletas.push(atleta);
            });
            
            loadingMessage.style.display = 'none';
            renderAbsolutoList();
        }

        function renderAbsolutoList() {
            listaInscritosDiv.innerHTML = ''; 
            
            const NOME_COLUNA_NOME = 'NOME COMPLETO';
            const NOME_COLUNA_EQUIPE = 'SUA EQUIPE';
            const NOME_COLUNA_STATUS = 'STATUS DO PAGAMENTO'; 
            
            // Ordena as chaves do grupo alfabeticamente
            Object.keys(inscritosAbsolutoAgrupados).sort().forEach(key => {
                const groupData = inscritosAbsolutoAgrupados[key];
                
                const accordionItem = document.createElement('div');
                accordionItem.className = 'accordion-item';
                
                const header = document.createElement('div');
                header.className = 'accordion-header';
                header.textContent = key; 
                
                const content = document.createElement('div');
                content.className = 'accordion-content';
                
                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Nome do Atleta</th>
                            <th>Equipe</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;
                const tbody = table.querySelector('tbody');

                groupData.atletas.forEach(atleta => {
                    const statusText = atleta[NOME_COLUNA_STATUS] || 'Pendente';
                    const statusClass = normalizeStatus(statusText);
                    
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td data-label="Nome do Atleta">${atleta[NOME_COLUNA_NOME]}</td>
                        <td data-label="Equipe">${atleta[NOME_COLUNA_EQUIPE]}</td>
                        <td data-label="Status" class="${statusClass}">${statusText}</td>
                    `;
                    tbody.appendChild(row);
                });
                
                content.appendChild(table);
                accordionItem.appendChild(header);
                accordionItem.appendChild(content);
                listaInscritosDiv.appendChild(accordionItem);
            });
            
            setupAccordion(); 
        }
        
        // --- Lógica de Acordeão ---

        function setupAccordion() {
            const accordionHeaders = listaInscritosDiv.querySelectorAll('.accordion-header');
            
            accordionHeaders.forEach(header => {
                header.removeEventListener('click', handleAccordionClick); 
                header.addEventListener('click', handleAccordionClick);
            });
        }
        
        function handleAccordionClick(event) {
             const header = event.currentTarget;
             const content = header.nextElementSibling;
                      
             // Fecha outros acordeões abertos
             listaInscritosDiv.querySelectorAll('.accordion-header').forEach(otherHeader => {
                 if (otherHeader !== header && otherHeader.classList.contains('active')) {
                     otherHeader.classList.remove('active');
                     otherHeader.nextElementSibling.classList.remove('open');
                 }
             });

             // Abre/Fecha o atual
             header.classList.toggle('active');
             content.classList.toggle('open');
        }

        // Inicializa o carregamento dos dados ao carregar a página
        document.addEventListener('DOMContentLoaded', fetchAndProcessData);
    </script>
</body>
</html>
