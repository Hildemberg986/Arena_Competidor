<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checagem por Equipes | Arena Competidor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb; 
            --accent-green: #22c55e;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-secondary: #6b7280;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%; text-align: center; padding: 15px 0;
            background-color: #000; position: fixed; top: 0; z-index: 1000;
        }
        header img { max-width: 250px; width: 80%; height: auto; }

        .main-content {
            margin-top: 140px;
            width: 90%;
            max-width: 1000px;
            padding-bottom: 60px;
            text-align: center;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            color: #111827;
            font-weight: 700; font-size: 2rem;
            margin-bottom: 40px;
        }

        .accordion-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid #e5e7eb;
            text-align: left;
        }

        .accordion-header {
            padding: 20px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            transition: background 0.2s;
        }

        .accordion-header:hover { background: #f8fafc; }

        .team-info h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            color: var(--primary-color);
            margin: 0;
        }

        .team-info p {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-green);
            margin: 4px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .accordion-header::after {
            content: '+';
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        .accordion-header.active::after { content: '-'; }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: #fff;
        }

        .accordion-content.open {
            max-height: 10000px;
            padding: 0 25px 25px;
            border-top: 1px solid #f3f4f6;
        }

        .professor-section {
            margin-top: 25px;
            border-left: 4px solid var(--primary-color);
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .professor-name {
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 10px;
            background: #f9fafb;
            padding: 8px 12px;
            border-radius: 6px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; padding: 12px; 
            font-size: 0.75rem; color: var(--text-secondary); 
            text-transform: uppercase; border-bottom: 2px solid #f3f4f6; 
        }
        td { padding: 14px 12px; border-bottom: 1px solid #f3f4f6; font-size: 0.9rem; }

        /* Estilização das Tags de Status */
        .status-tag {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 6px;
            display: inline-block;
        }
        /* Verde para confirmado */
        .status-confirmado {
            background-color: #dcfce7;
            color: #166534;
        }
        /* Amarelo para aguardando / pendente */
        .status-aguardando {
            background-color: #fef9c3;
            color: #854d0e;
        }

        .link-voltar {
            display: inline-block;
            margin-top: 40px;
            padding: 14px 30px;
            background-color: #111827;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .link-voltar:hover { background-color: var(--primary-color); transform: translateY(-2px); }

        #loading-message { padding: 50px; font-weight: 600; color: var(--primary-color); }

        @media (max-width: 768px) {
            .main-content { margin-top: 110px; }
            thead { display: none; }
            tr { display: block; border-bottom: 2px solid #f3f4f6; padding: 10px 0; }
            td { display: flex; justify-content: space-between; border: none; padding: 6px 0; }
            td::before { content: attr(data-label); font-weight: 700; color: var(--text-secondary); font-size: 0.75rem; }
            .status-tag { margin-top: -4px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../../index.html"><img src="../../img/arena2.png" alt="Arena Competidor Logo"></a>
    </header>

    <div class="main-content">
        <h1>Checagem por Equipes</h1>
        <div id="loading-message">Sincronizando banco de dados...</div>
        <div id="listaEquipes"></div>
        <a href="checagem.html" class="link-voltar">Voltar para Opções</a>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnk0AV5e-clwsnK39VE1JiMGpSIPmCHGtTDSbA9WxzZDGSgZlYLU7FhM-B8I_3yoNExXxCMe0k_y4s/pub?output=csv';
        
        async function fetchAndProcessData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== '');
                
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toUpperCase());
                
                // Mapeia os índices dinamicamente, exceto o status que está travado na Coluna R
                const idx = {
                    nome: headers.indexOf('NOME COMPLETO'),
                    equipe: headers.indexOf('SUA EQUIPE'),
                    professor: headers.findIndex(h => h.includes('PROFESSOR') || h.includes('LÍDER') || h.includes('LIDER')),
                    faixa: headers.indexOf('SUA FAIXA'),
                    status: 17, // Coluna R é estritamente o índice 17 (A=0, B=1 ... R=17)
                    categoria: headers.indexOf('SUA CATEGORIA')
                };

                const data = lines.slice(1).map(line => {
                    const values = line.split(',').map(v => v.replace(/"/g, '').trim());
                    return {
                        nome: values[idx.nome] || '',
                        equipe: values[idx.equipe] || 'SEM EQUIPE',
                        professor: values[idx.professor] || 'NÃO INFORMADO',
                        faixa: values[idx.faixa] || '',
                        status: values[idx.status] || 'AGUARDANDO', 
                        categoria: values[idx.categoria] || ''
                    };
                });

                renderEquipes(data);
            } catch (error) {
                document.getElementById('loading-message').textContent = '❌ Erro ao carregar dados.';
                console.error(error);
            }
        }
        
        function renderEquipes(data) {
            const container = document.getElementById('listaEquipes');
            document.getElementById('loading-message').style.display = 'none';
            const estrutura = {};

            data.forEach(atleta => {
                const equipe = atleta.equipe;
                const professor = atleta.professor;

                if (!estrutura[equipe]) estrutura[equipe] = { total: 0, professores: {} };
                if (!estrutura[equipe].professores[professor]) estrutura[equipe].professores[professor] = [];
                
                estrutura[equipe].professores[professor].push(atleta);
                estrutura[equipe].total++;
            });

            Object.keys(estrutura).sort().forEach(nomeEquipe => {
                const infoEquipe = estrutura[nomeEquipe];
                const item = document.createElement('div');
                item.className = 'accordion-item';
                
                let htmlProfessores = '';
                Object.keys(infoEquipe.professores).sort().forEach(prof => {
                    htmlProfessores += `
                        <div class="professor-section">
                            <div class="professor-name">Professor: ${prof}</div>
                            <table>
                                <thead>
                                    <tr><th>Atleta</th><th>Faixa</th><th>Categoria</th><th>Status</th></tr>
                                </thead>
                                <tbody>
                                    ${infoEquipe.professores[prof].map(a => {
                                        // Identifica a classe de cor com base no texto do status
                                        const statusTexto = a.status.toUpperCase();
                                        let classeStatus = 'status-aguardando'; // Padrão amarelo
                                        
                                        if (statusTexto.includes('CONFIRMADO') || statusTexto.includes('PAGO')) {
                                            classeStatus = 'status-confirmado'; // Verde
                                        }

                                        return `
                                            <tr>
                                                <td data-label="Atleta">${a.nome}</td>
                                                <td data-label="Faixa">${a.faixa}</td>
                                                <td data-label="Categoria">${a.categoria}</td>
                                                <td data-label="Status"><span class="status-tag ${classeStatus}">${a.status}</span></td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                });

                item.innerHTML = `
                    <div class="accordion-header" onclick="toggleAcc(this)">
                        <div class="team-info">
                            <h2>${nomeEquipe}</h2>
                            <p>${infoEquipe.total} Atleta(s) Inscrito(s)</p>
                        </div>
                    </div>
                    <div class="accordion-content">${htmlProfessores}</div>
                `; 
                container.appendChild(item);
            });
        }
        
        function toggleAcc(el) {
            document.querySelectorAll('.accordion-header').forEach(header => {
                if (header !== el && header.classList.contains('active')) {
                    header.classList.remove('active');
                    header.nextElementSibling.classList.remove('open');
                }
            });
            el.classList.toggle('active');
            el.nextElementSibling.classList.toggle('open');
        }

        fetchAndProcessData();
    </script>
</body>
</html>
