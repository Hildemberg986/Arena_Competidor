<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio da Várzea - 1º Lote Encerrado</title>
    <!-- Google Fonts para uma tipografia marcante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Fundo com textura ou efeito de luz de estádio/arena */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        .badge {
            background-color: #e50914;
            color: #fff;
            padding: 8px 16px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        h1 span {
            color: #e50914;
            display: block;
        }

        p {
            font-size: 1.2rem;
            color: #cccccc;
            margin-bottom: 40px;
            font-weight: 400;
            line-height: 1.6;
        }

        .alert-box {
            border-left: 4px solid #e50914;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        .alert-box strong {
            color: #ffffff;
            display: block;
            font-size: 1.4rem;
            text-transform: uppercase;
            font-style: normal;
            margin-bottom: 5px;
        }

        /* Animação do Badge para dar sensação de urgência */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Responsivo para celulares menores */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            p { font-size: 1rem; }
            .alert-box strong { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Aviso de status -->
        <div class="badge">Esgotado</div>

        <!-- Título Principal -->
        <h1>O 1º Lote do <span>Desafio da Várzea</span> Encerrou!</h1>

        <!-- Mensagem de suporte -->
        <p>Quem voou, garantiu o menor preço. Quem vacilou, vai ter que correr no próximo.</p>

        <!-- Chamada para o 2º lote -->
        <div class="alert-box">
            <strong>Fique ligado!</strong>
            O 2º lote será liberado já já. Não perca o cronograma!
        </div>
    </div>

</body>
</html>
