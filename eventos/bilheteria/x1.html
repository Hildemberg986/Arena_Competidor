<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Pro - Noite de Gala</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Oswald:wght@600;700&display=swap');

        :root {
            --primary: #e62117;
            --bg: #0f0f10;
            --card-bg: #1a1b1e;
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --border: #27272a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 30px;
            padding: 20px;
        }

        .event-showcase {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .event-showcase img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        .event-details { padding: 30px; }
        .event-details h1 { 
            font-family: 'Oswald', sans-serif; 
            font-size: 2.5rem; 
            margin: 0 0 10px 0; 
            text-transform: uppercase;
        }

        .badge-live {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .step-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .qty-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #27272a;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .qty-controls { display: flex; align-items: center; gap: 20px; }
        .qty-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; color: var(--text-dim); }
        
        input {
            width: 100%;
            background: #0f0f10;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .summary {
            background: #27272a;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .total-row { 
            display: flex; justify-content: space-between; 
            margin-top: 15px; padding-top: 15px; 
            border-top: 1px dashed #52525b;
            font-size: 1.5rem; font-weight: bold; color: var(--primary);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="event-showcase">
        <img src="x12.JPEG" alt="Evento">
        <div class="event-details">
            <span class="badge-live">EVENTO AO VIVO</span>
            <h1>X1 de JIU-JITSU</h1>
            <p style="color: var(--text-dim);">🗓️ 17 de ABRIL, 18:00h</p>
        </div>
    </div>

    <div class="checkout-form">
        <div class="card">
            <div class="step-title">01. Quantidade</div>
            <div class="qty-selector">
                <span>Ingresso Individual</span>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="updateQty(-1)">-</button>
                    <b id="display-qty">1</b>
                    <button class="qty-btn" onclick="updateQty(1)">+</button>
                </div>
            </div>

            <div class="step-title">02. Seus Dados</div>
            <form id="mainForm">
                <div class="input-group">
                    <label>NOME COMPLETO</label>
                    <input type="text" id="nome" required placeholder="Ex: João Silva">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>CPF</label>
                        <input type="text" id="cpf" required placeholder="000.000.000-00">
                    </div>
                    <div class="input-group">
                        <label>WHATSAPP (COM DDD)</label>
                        <input type="text" id="tel" required placeholder="(84) 98888-7777">
                    </div>
                </div>
                <div class="input-group">
                    <label>E-MAIL PARA ENVIO</label>
                    <input type="email" id="email" required placeholder="contato@exemplo.com">
                </div>
            </form>
        </div>

        <div class="card">
            <div class="step-title">03. Resumo</div>
            <div class="summary">
                <div class="summary-row"><span>Subtotal (<span id="sum-qty">1</span>x)</span><span id="sum-sub">R$ 30,00</span></div>
                <div class="total-row"><span>TOTAL</span><span id="sum-total">R$ 33,00</span></div>
            </div>
            <button type="submit" form="mainForm" class="btn-submit" id="btnGo">PAGAMENTO</button>
        </div>
    </div>
</div>

<script>
    let qtd = 1;
    const precoBase = 30.00;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXUBHP6JutPI5plU40nEeYKIoV0LYsTaWxxykgQj5CQPjAWhpiIIAsQs9TEM9R95E/exec";

    function updateQty(n) {
        qtd += n; if (qtd < 1) qtd = 1;
        document.getElementById('display-qty').innerText = qtd;
        renderSummary();
    }

    function renderSummary() {
        const sub = qtd * precoBase;
        const total = sub * 1.1;
        document.getElementById('sum-qty').innerText = qtd;
        document.getElementById('sum-sub').innerText = "R$ " + sub.toFixed(2).replace('.',',');
        document.getElementById('sum-total').innerText = "R$ " + total.toFixed(2).replace('.',',');
    }

    // Máscara de Telefone em Tempo Real
    document.getElementById('tel').addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGo');
        btn.disabled = true;
        btn.innerText = "💾 SALVANDO NO SISTEMA...";

        const ordId = "ING_" + Date.now();
        const totalStr = document.getElementById('sum-total').innerText;
        const nomeComp = document.getElementById('nome').value;

        // LIMPEZA E SEPARAÇÃO DO WHATSAPP
        const rawTel = document.getElementById('tel').value.replace(/\D/g, ''); 
        const ddd = rawTel.substring(0, 2);
        const celular = rawTel.substring(2);

        const payload = {
            ord: ordId,
            nome: nomeComp,
            cpf: document.getElementById('cpf').value,
            ddd: ddd,
            celular: celular,
            email: document.getElementById('email').value,
            valor: totalStr,
            descricao: qtd + "x Ingressos Noite de Gala"
        };

        // Envio para o Google
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
        });

        // Delay para garantir gravação antes de mudar de página
        setTimeout(() => {
            window.location.href = `pagamento.html?ord=${ordId}&valor=${encodeURIComponent(totalStr)}&nome=${encodeURIComponent(nomeComp)}&qtd=${qtd}`;
        }, 2000);
    };
</script>
</body>
</html>
