<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Arena Competidor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e62117;
            --primary-soft: #fff1f0;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* Header Premium */
        header {
            background: var(--card);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .logo-box { max-width: 140px; }
        .logo-box img { width: 100%; height: auto; display: block; }

        /* Botão Flutuante de Scan */
        .quick-scan {
            background: var(--primary);
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.3rem;
            box-shadow: 0 6px 15px rgba(230, 33, 23, 0.3);
            transition: var(--transition);
        }

        .quick-scan:active { transform: scale(0.9); }

        /* Layout */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .header-text { margin-bottom: 2.5rem; }
        .header-text h1 { font-size: 1.8rem; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .header-text p { color: var(--text-light); margin: 5px 0 0 0; font-size: 1rem; }

        /* Grid System */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .menu-item {
            background: var(--card);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .menu-item:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
        }

        .icon-circle {
            width: 72px;
            height: 72px;
            background: var(--primary-soft);
            color: var(--primary);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .menu-item:hover .icon-circle {
            background: var(--primary);
            color: white;
            transform: rotate(-5deg) scale(1.1);
        }

        .menu-item h2 { font-size: 1.4rem; font-weight: 700; margin: 0 0 0.5rem 0; }
        .menu-item p { color: var(--text-light); font-size: 0.95rem; margin: 0; line-height: 1.5; }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 4rem 1rem 2rem;
            color: var(--text-light);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Responsividade Mobile */
        @media (max-width: 600px) {
            .container { padding: 1.5rem 1rem; }
            .header-text { margin-bottom: 1.5rem; text-align: center; }
            .header-text h1 { font-size: 1.5rem; }
            
            .menu-grid { grid-template-columns: 1fr; gap: 1rem; }
            
            .menu-item {
                padding: 1.5rem;
                flex-direction: row; /* Layout horizontal no celular */
                text-align: left;
                align-items: center;
                gap: 1.2rem;
            }

            .icon-circle {
                width: 56px;
                height: 56px;
                font-size: 1.4rem;
                margin-bottom: 0;
                flex-shrink: 0;
                border-radius: 16px;
            }

            .menu-item h2 { font-size: 1.15rem; margin-bottom: 2px; }
            .menu-item p { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="../../img/arena03.png" alt="Arena Competidor">
        </div>
        
      
    </header>

    <main class="container">
        <section class="header-text">
            <h1>Painel de Controle</h1>
            <p>Selecione uma área para gerenciar</p>
        </section>

        <nav class="menu-grid">
            <a href="bilheteriadigital.html" class="menu-item">
                <div class="icon-circle">
                    <i class="fa-solid fa-ticket-simple"></i>
                </div>
                <div>
                    <h2>Ingressos</h2>
                    <p>Vendas, lista de nomes e emissão de tickets.</p>
                </div>
            </a>

            <a href="financeiro.html" class="menu-item">
                <div class="icon-circle">
                    <i class="fa-solid fa-chart-pie"></i>
                </div>
                <div>
                    <h2>Financeiro</h2>
                    <p>Relatórios de lucro e balanço do evento.</p>
                </div>
            </a>

            <a href="../DTC/verificador.html" class="menu-item">
                <div class="icon-circle">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <div>
                    <h2>Verificador</h2>
                    <p>Validar ingressos via QR Code no acesso.</p>
                </div>
            </a>
        </nav>
    </main>

    <footer>
        Arena Competidor &copy; 2026 &bull; Todos os direitos reservados
    </footer>

</body>
</html>
