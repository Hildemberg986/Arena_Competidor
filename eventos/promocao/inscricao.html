         * @param {number} idade 
         * @returns {string | string[] | null} 
         */
        function obterDivisao(idade) {
            if (idade === 13) return "Infanto-Juvenil 1"; 
            if (idade === 14) return "Infanto-Juvenil 2";
            if (idade === 15) return "Infanto-Juvenil 3"; 
            if (idade >= 16 && idade <= 17) return "Juvenil";
            if (idade >= 18 && idade <= 29) return "Adulto";
            if (idade >= 30) {
                return obterMastersPermitidos(idade);
            }
            return null; 
        }

        /**
         * Retorna as categorias Master permitidas com base na idade.
         * @param {number} idade - A idade do atleta.
         * @returns {string[]} Um array de categorias Master (incluindo Adulto).
         */
        function obterMastersPermitidos(idade) {
            if (idade < 30) return [];
            const categoriasUnicas = ["Adulto"]; 
            
            if (idade >= 30) categoriasUnicas.push("Master 1");
            if (idade >= 36) categoriasUnicas.push("Master 2");
            if (idade >= 41) categoriasUnicas.push("Master 3");
            if (idade >= 46) categoriasUnicas.push("Master 4");
            if (idade >= 51) categoriasUnicas.push("Master 5");
            if (idade >= 56) categoriasUnicas.push("Master 6");
            if (idade >= 61) categoriasUnicas.push("Master 7");
            
            return categoriasUnicas.filter((v, i, a) => a.indexOf(v) === i);
        }

        /**
         * FUNÇÃO NOVA: Realiza o cálculo de validação dos dígitos do CPF.
         * @param {string} cpf - CPF com 11 dígitos (apenas números).
         * @returns {boolean} True se o CPF for válido.
         */
        function validarCPF(cpf) {
            // Remove CPFs com todos os dígitos iguais (ex: 111.111.111-11)
            if (/^(\d)\1{10}$/.test(cpf)) return false; 

            // Valida 1o digito
            let soma = 0;
            let resto;
            for (let i = 1; i <= 9; i++) {
                soma = soma + parseInt(cpf.substring(i - 1, i)) * (11 - i);
            }
            resto = (soma * 10) % 11;

            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;

            // Valida 2o digito
            soma = 0;
            for (let i = 1; i <= 10; i++) {
                soma = soma + parseInt(cpf.substring(i - 1, i)) * (12 - i);
            }
            resto = (soma * 10) % 11;

            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(10, 11))) return false;

            return true;
        }


        function aplicarMascaraCPF(input) {
            let value = input.value.replace(/\D/g, ""); // Apenas dígitos
            
            // Aplica a máscara visual
            if (value.length > 3) value = value.replace(/(\d{3})(\d)/, "$1.$2");
            if (value.length > 6) value = value.replace(/(\d{3})(\d)/, "$1.$2");
            if (value.length > 9) value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            input.value = value;
            
            // Validação de formato (14 caracteres formatados)
            if (value.length === 14) {
                // Validação de cálculo
                if (validarCPF(value.replace(/\D/g, ""))) {
                     input.setCustomValidity(""); // OK e VÁLIDO
                } else {
                     input.setCustomValidity("O CPF digitado é inválido. Verifique os números.");
                }
            } else {
                input.setCustomValidity("O CPF deve ter 11 dígitos no formato XXX.XXX.XXX-XX");
            }
        }

        function aplicarMascaraCelular(input) {
            let value = input.value.replace(/\D/g, ""); // Remove tudo que não for dígito
            
            if (value.length > 5) value = value.replace(/^(\d{5})(\d{1,4})$/, "$1-$2"); 
            
            input.value = value;

            if (value.length === 10) {
                input.setCustomValidity("");
            } else {
                input.setCustomValidity("O Celular deve ter 9 dígitos no formato XXXXX-XXXX.");
            }
        }

        function calcularIdade(dataNascimento) {
            const hoje = new Date();
            const nascimento = new Date(dataNascimento);
            let idade = hoje.getFullYear() - nascimento.getFullYear();
            const mes = hoje.getMonth() - nascimento.getMonth();
            if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
                idade--;
            }
            return idade;
        }

            if (selectElement.id === 'faixa') {

            }

                formData.set('absoluto', 'Sim');
            } else {
                formData.set('absoluto', 'Não');
            }
            
            const params = new URLSearchParams(formData).toString();

            try {
                const response = await fetch(URL_GOOGLE_SCRIPT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',

                    body: params
