<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisito de Medalhas | Arena Competidor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1e40af; --success: #10b981;
            --warning: #f59e0b; --bg-body: #f1f5f9; --text-main: #1e293b;
            --text-muted: #64748b; --radius: 12px; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; line-height: 1.5; }
        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; position: sticky; top: 0; z-index: 1000; }
        h1 { font-size: 1.25rem; margin: 10px 0 0; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-voltar { position: absolute; left: 15px; top: 25px; background: white; padding: 8px 12px; text-decoration: none; border-radius: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-main); border: 1px solid #e2e8f0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px 15px; }
        #medalhas-container h2 { font-size: 1rem; text-transform: uppercase; color: var(--text-muted); margin: 30px 0 15px; }
        .resumo-medalhas { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card-valor { background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); border-left: 6px solid var(--primary); }
        .card-valor h3 { margin: 0 0 15px; font-size: 0.85rem; color: var(--text-muted); }
        .medal-count { display: flex; justify-content: space-between; align-items: center; }
        .medal { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .medal span:last-child { font-weight: 800; font-size: 1.1rem; }
        .total-geral-card { grid-column: 1 / -1; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 25px; border-radius: var(--radius); }
        .total-geral-card h3 { color: #94a3b8; }
        .total-geral-card .valor { font-size: 2rem; color: var(--success); }
        .total-nominal { border-left-color: var(--primary); }
        .total-confirmado { border-left-color: var(--success); }
        #loading-message { text-align: center; padding: 50px; font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>
    <header>
        <a href="dashboard-event.html" class="btn-voltar">← Voltar</a>
        <h1>Contagem Oficial de Medalhas</h1>
    </header>

    <div class="container">
        <div id="loading-message">Lendo dados em tempo real...</div>
        <div id="medalhas-container" style="display: none;">
            <section>
                <h2>📊 Geral (Todos os Inscritos)</h2>
                <div class="resumo-medalhas" id="resumo-todos"></div>
            </section>
            <section>
                <h2>✅ Confirmados (Inscrições Pagas)</h2>
                <div class="resumo-medalhas" id="resumo-confirmados"></div>
            </section>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnk0AV5e-clwsnK39VE1JiMGpSIPmCHGtTDSbA9WxzZDGSgZlYLU7FhM-B8I_3yoNExXxCMe0k_y4s/pub?output=csv';

        function normalize(text) {
            return text ? String(text).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : '';
        }

        // Regra de medalhas oficial
        function getMedalhas(qtd) {
            if (qtd <= 0) return { o: 0, p: 0, b: 0, t: 0 };
            if (qtd === 1) return { o: 1, p: 0, b: 0, t: 1 };
            if (qtd === 2) return { o: 1, p: 1, b: 0, t: 2 };
            return { o: 1, p: 1, b: 2, t: 4 }; // 3 ou mais atletas
        }

        async function fetchAndProcess() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                // Divide linhas e trata colunas com aspas/vírgulas
                const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
                const headers = rows[0].split(',').map(h => h.replace(/"/g, '').trim());
                
                const atletas = rows.slice(1).map(row => {
                    // Regex para separar por vírgula mas ignorar vírgulas dentro de aspas
                    const values = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
                    let obj = {};
                    headers.forEach((h, i) => {
                        obj[h] = values[i] ? values[i].replace(/"/g, '').trim() : '';
                    });
                    return obj;
                }).filter(a => a['NOME COMPLETO']);

                const calcular = (lista) => {
                    let cats = {};
                    let abss = {};

                    lista.forEach(a => {
                        const chaveCat = normalize(`${a['SUA CATEGORIA']}-${a['SUA FAIXA']}-${a['SEU PESO']}-${a['SEXO']}`);
                        if(chaveCat) cats[chaveCat] = (cats[chaveCat] || 0) + 1;

                        if (normalize(a['ABSOLUTO']) === 'sim') {
                            const chaveAbs = normalize(`ABS-${a['SUA FAIXA']}-${a['SEXO']}`);
                            abss[chaveAbs] = (abss[chaveAbs] || 0) + 1;
                        }
                    });

                    let res = { o:0, p:0, b:0, t:0, cat:{o:0,p:0,b:0,t:0}, abs:{o:0,p:0,b:0,t:0} };

                    Object.values(cats).forEach(q => {
                        const m = getMedalhas(q);
                        res.cat.o += m.o; res.cat.p += m.p; res.cat.b += m.b; res.cat.t += m.t;
                    });
                    Object.values(abss).forEach(q => {
                        const m = getMedalhas(q);
                        res.abs.o += m.o; res.abs.p += m.p; res.abs.b += m.b; res.abs.t += m.t;
                    });

                    res.o = res.cat.o + res.abs.o;
                    res.p = res.cat.p + res.abs.p;
                    res.b = res.cat.b + res.abs.b;
                    res.t = res.o + res.p + res.b;
                    return res;
                };

                // FILTRO CRÍTICO: Verifica a coluna de status
                const atletasConfirmados = atletas.filter(a => {
                    // Tenta encontrar em 'STATUS' ou 'STATUS DO PAGAMENTO'
                    const statusVal = normalize(a['STATUS DO PAGAMENTO'] || a['STATUS'] || '');
                    return statusVal.includes('pago') || statusVal.includes('confirmado') || statusVal.includes('aprovado');
                });

                render('resumo-todos', calcular(atletas));
                render('resumo-confirmados', calcular(atletasConfirmados));

                document.getElementById('loading-message').style.display = 'none';
                document.getElementById('medalhas-container').style.display = 'block';

            } catch (e) {
                console.error(e);
                document.getElementById('loading-message').innerHTML = "❌ Erro: Verifique se a planilha está publicada como CSV.";
            }
        }

        function render(id, d) {
            document.getElementById(id).innerHTML = `
                <div class="card-valor">
                    <h3>Categorias</h3>
                    <div class="medal-count">
                        <div class="medal"><span>🥇</span><span>${d.cat.o}</span></div>
                        <div class="medal"><span>🥈</span><span>${d.cat.p}</span></div>
                        <div class="medal"><span>🥉</span><span>${d.cat.b}</span></div>
                    </div>
                </div>
                <div class="card-valor">
                    <h3>Absolutos</h3>
                    <div class="medal-count">
                        <div class="medal"><span>🥇</span><span>${d.abs.o}</span></div>
                        <div class="medal"><span>🥈</span><span>${d.abs.p}</span></div>
                        <div class="medal"><span>🥉</span><span>${d.abs.b}</span></div>
                    </div>
                </div>
                <div class="total-geral-card">
                    <h3>Total Necessário</h3>
                    <div class="medal-count">
                        <div class="medal"><span>🥇</span><span>${d.o}</span></div>
                        <div class="medal"><span>🥈</span><span>${d.p}</span></div>
                        <div class="medal"><span>🥉</span><span>${d.b}</span></div>
                        <div class="medal"><span>SOMA</span><span class="valor">${d.t}</span></div>
                    </div>
                </div>
            `;
        }

        window.onload = fetchAndProcess;
    </script>
</body>
</html>
